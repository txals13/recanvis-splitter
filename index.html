<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Separador de fulles de recanvis</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222c; --border:#2a2f3a;
    --text:#e8eaed; --muted:#9aa3b2; --accent:#4f8cff; --accent2:#2f6fe0;
    --ok:#2ecc71; --danger:#e74c3c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
  }
  header{
    position:sticky; top:0; z-index:20; background:var(--panel);
    border-bottom:1px solid var(--border); padding:12px 16px;
    display:flex; flex-wrap:wrap; gap:10px; align-items:center;
  }
  header h1{font-size:16px; margin:0 12px 0 0; white-space:nowrap; font-weight:600;}
  .spacer{flex:1;}
  button{
    background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:6px; padding:8px 12px; font-size:13px; cursor:pointer;
  }
  button:hover:not(:disabled){border-color:var(--accent);}
  button:disabled{opacity:.4; cursor:not-allowed;}
  button.primary{background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:600;}
  button.primary:hover:not(:disabled){background:var(--accent);}
  input[type=text]{
    background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:6px; padding:8px 10px; font-size:13px; width:180px;
  }
  #dropzone{
    margin:40px auto; max-width:560px; border:2px dashed var(--border);
    border-radius:12px; padding:48px 24px; text-align:center; color:var(--muted);
  }
  #dropzone.drag{border-color:var(--accent); color:var(--text);}
  #dropzone input[type=file]{display:none;}
  #dropzone .browse{color:var(--accent); text-decoration:underline; cursor:pointer;}
  #fileInfo{font-size:13px; color:var(--muted); white-space:nowrap;}
  #status{font-size:13px; color:var(--muted); padding:0 16px;}
  #grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr));
    gap:14px; padding:16px;
  }
  .cell{
    background:var(--panel); border:2px solid var(--border); border-radius:8px;
    cursor:pointer; position:relative; overflow:hidden; user-select:none;
    transition:border-color .1s;
  }
  .cell.selected{border-color:var(--accent);}
  .thumbWrap{
    background:#0a0b0e; display:flex; align-items:center; justify-content:center;
    min-height:120px;
  }
  .cell canvas{display:block; width:100%; height:auto;}
  .cellFooter{
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 8px; font-size:12px; color:var(--muted);
  }
  .pageNum{font-weight:600; color:var(--text);}
  .check{
    width:16px; height:16px; border-radius:4px; border:1.5px solid var(--border);
    background:var(--panel2); display:flex; align-items:center; justify-content:center;
  }
  .cell.selected .check{background:var(--accent); border-color:var(--accent);}
  .check::after{content:""; width:8px; height:5px; border-left:2px solid #fff; border-bottom:2px solid #fff; transform:rotate(-45deg) translateY(-1px); display:none;}
  .cell.selected .check::after{display:block;}
  .zoomBtn{
    position:absolute; top:6px; right:6px; width:26px; height:26px; border-radius:6px;
    background:rgba(0,0,0,.55); border:1px solid rgba(255,255,255,.2); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:13px; opacity:0;
    transition:opacity .1s;
  }
  .cell:hover .zoomBtn{opacity:1;}
  #modalOverlay{
    position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:150;
    display:none; align-items:center; justify-content:center; flex-direction:column;
  }
  #modalOverlay.open{display:flex;}
  #modalTop{display:flex; align-items:center; gap:16px; color:var(--text); margin-bottom:10px; flex-wrap:wrap;}
  #modalPickHint{display:none; background:var(--accent2); color:#fff; padding:6px 12px; border-radius:6px; font-size:13px;}
  #modalImgWrap.picking canvas{cursor:crosshair;}
  #modalImgWrap{max-width:92vw; max-height:78vh; overflow:auto; background:#0a0b0e; border-radius:8px; position:relative;}
  #modalImgWrap canvas{display:block; max-width:none;}
  #pickRect{position:absolute; border:1.5px dashed var(--accent); background:rgba(79,140,255,.18); display:none; pointer-events:none; z-index:5;}
  #modalOverlay button{padding:8px 14px;}
  .placeholder{color:var(--muted); font-size:24px;}
  #emptyState{display:none; text-align:center; color:var(--muted); padding:60px 20px;}
  footer{
    position:sticky; bottom:0; background:var(--panel); border-top:1px solid var(--border);
    padding:10px 16px; display:none; align-items:center; gap:12px; flex-wrap:wrap;
  }
  #selCount{font-size:13px; color:var(--text);}
  #toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--panel2); border:1px solid var(--border); padding:10px 16px;
    border-radius:8px; font-size:13px; z-index:200; display:none;
  }

  /* ---- Machine info (serial / model / client / portada) ---- */
  #machinePanel{
    display:none; border-bottom:1px solid var(--border); padding:10px 16px;
    background:var(--panel); align-items:center; gap:10px; flex-wrap:wrap;
  }
  #machinePanel strong{font-size:13px; margin-right:4px;}
  #machinePanel input{width:150px;}
  #portadaInfo{font-size:12px; color:var(--muted);}

  /* ---- Conjunts (top-level) ---- */
  #conjuntsPanel{
    display:none; border-bottom:1px solid var(--border); padding:12px 16px;
    background:var(--panel);
  }
  #conjuntsPanelHeader{
    display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap;
  }
  #conjuntsPanelHeader strong{font-size:13px; margin-right:4px;}
  #remapLbl{
    display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted);
    cursor:pointer; margin-left:4px;
  }
  #remapLbl input{width:auto; cursor:pointer;}
  #conjuntChipsList{display:flex; flex-wrap:wrap; gap:10px;}
  .conjuntChip{
    background:var(--panel2); border:1px solid var(--border); border-radius:8px;
    padding:8px 10px; cursor:pointer; position:relative; min-width:150px;
    max-width:220px;
  }
  .conjuntChip:hover{border-color:var(--accent);}
  .conjuntChip .gName{font-size:13px; font-weight:600; margin-right:16px; word-break:break-word;}
  .conjuntChip .gMeta{font-size:11px; color:var(--muted); margin-top:4px;}
  .conjuntChip .gDel{
    position:absolute; top:6px; right:6px; width:18px; height:18px; line-height:16px;
    text-align:center; border-radius:4px; background:transparent; color:var(--muted);
    font-size:12px; border:1px solid transparent;
  }
  .conjuntChip .gDel:hover{border-color:var(--danger); color:var(--danger);}

  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:100;
    display:none; align-items:center; justify-content:center; flex-direction:column;
  }
  .overlay.open{display:flex;}
  .overlay button{padding:8px 14px;}

  #nameModalCard, .reviewCard{
    background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:20px; max-width:92vw;
  }
  #nameModalCard label{display:block; font-size:13px; color:var(--muted); margin-bottom:8px;}
  #nameModalCard input[type=text]{width:280px; margin-bottom:14px;}
  #nameModalCard .actions{display:flex; justify-content:flex-end; gap:8px;}

  .reviewCard{width:min(1100px,94vw); max-height:88vh; overflow:auto;}
  .reviewTop{display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap;}
  .reviewTop input[type=text]{width:260px;}
  .reviewThumbs{display:flex; gap:8px; overflow-x:auto; margin-bottom:16px; padding-bottom:4px;}
  .reviewThumbs canvas{height:140px; width:auto; border:1px solid var(--border); border-radius:6px; flex-shrink:0;}
  table.rowsTable{width:100%; border-collapse:collapse; margin-bottom:12px;}
  table.rowsTable th{text-align:left; font-size:11px; color:var(--muted); padding:4px 6px; border-bottom:1px solid var(--border);}
  table.rowsTable td{padding:4px 6px; border-bottom:1px solid var(--border);}
  table.rowsTable input[type=text]{width:100%; padding:6px 8px;}
  table.rowsTable td.posCol input{width:60px;}
  table.rowsTable td.cantCol input{width:60px;}
  table.rowsTable td.refCol input{width:120px;}
  table.rowsTable td.rmCol{width:30px;}
  .rmRowBtn{width:26px; height:26px; padding:0; color:var(--danger); border-color:var(--border);}
  .subgrupBox{border:1px solid var(--border); border-radius:8px; padding:10px 12px; margin-bottom:12px; background:var(--panel2);}
  .subgrupHdr{display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap;}
  .subgrupHdr .sgLabel{font-size:12px; color:var(--muted); min-width:52px;}
  .subgrupHdr input{width:220px;}
  .subgrupHdr input.sgNum{width:120px;}
  .subgrupHdr .sgDel{color:var(--danger); margin-left:auto;}
  .sgPagesRow{display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap;}
  .sgPagesRow input.sgPages{width:120px;}
  .sgPagesRow .sgHint{font-size:11px; color:var(--muted);}
  .reviewActions{display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;}
  .reviewActions .left{display:flex; gap:8px;}
  .reviewActions .right{display:flex; gap:8px;}
  #reviewPendingPanel{
    display:none; background:var(--panel2); border:1px dashed var(--border);
    border-radius:8px; padding:20px; text-align:center; margin-bottom:16px;
  }
  #reviewPendingPanel p{margin:0 0 12px; color:var(--muted); font-size:13px;}

  #conjuntDetailCard{width:min(640px,92vw);}
  #grupsList{margin-bottom:12px;}
  .grupRow{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--panel2); border:1px solid var(--border); border-radius:8px;
    padding:10px 12px; margin-bottom:8px; cursor:pointer;
  }
  .grupRow:hover{border-color:var(--accent);}
  .grupRow.pending{border-style:dashed;}
  .grupRow .cInfo{display:flex; flex-direction:column; gap:2px;}
  .grupRow .cName{font-size:13px; font-weight:600;}
  .grupRow .cMeta{font-size:11px; color:var(--muted);}
  .grupRow.pending .cMeta{color:#e0a94f;}
  .grupRow .cDel{color:var(--danger); flex-shrink:0;}
  #conjuntDetailEmpty{color:var(--muted); font-size:13px; padding:4px 0 12px;}
  #addGrupBtn, #importMenuBtn{margin-bottom:4px; margin-right:8px;}

  #menuImportCard{width:min(480px,92vw); max-height:80vh; overflow:auto;}
  #menuImportList{margin:14px 0; display:flex; flex-direction:column; gap:6px;}
  .menuImportRow{
    display:flex; align-items:center; gap:10px; font-size:13px;
    background:var(--panel2); border:1px solid var(--border); border-radius:6px;
    padding:8px 10px; cursor:pointer;
  }
  .menuImportRow input{width:auto;}
</style>
</head>
<body>

<header id="mainHeader" style="display:none;">
  <h1>Separador de fulles de recanvis</h1>
  <div id="fileInfo"></div>
  <div class="spacer"></div>
  <input type="text" id="rangeInput" placeholder="ex: 81-194, 341">
  <button id="addRangeBtn">Afegeix pàgines</button>
  <button id="selectAllBtn">Selecciona-ho tot</button>
  <button id="clearSelBtn">Neteja selecció</button>
  <button id="createConjuntBtn">Crea un conjunt</button>
  <button id="newFileBtn">Obre un altre PDF</button>
</header>

<div id="machinePanel">
  <strong>Màquina</strong>
  <input type="text" id="machSerial" placeholder="Núm. de sèrie">
  <input type="text" id="machModel" placeholder="Model">
  <input type="text" id="machClient" placeholder="Client">
  <span id="portadaInfo">Portada: —</span>
  <button id="portadaClearBtn" style="display:none;">Treu portada</button>
  <button id="importJsonBtn" title="Importa un conjunt d'un fitxer JSON exportat">⬆ Importa (JSON)</button>
  <input type="file" id="importJsonInput" accept="application/json,.json" style="display:none;">
</div>

<div id="conjuntsPanel">
  <div id="conjuntsPanelHeader">
    <strong>Conjunts</strong>
    <button id="exportCombinedBtn">Exporta tots (un sol JSON)</button>
    <button id="exportCombinedPdfBtn">Exporta tots (un sol PDF)</button>
    <button id="exportCatalogBtn">Exporta tots (un JSON per conjunt)</button>
    <button id="exportCatalogPdfBtn">Exporta tots (un PDF per conjunt)</button>
    <label id="remapLbl" title="Marca-ho si vols pujar la parella PDF+JSON al field app: el JSON es renumera perquè les pàgines quadrin amb el PDF exportat. Desmarcat, el JSON manté la numeració del manual original.">
      <input type="checkbox" id="remapPagesChk"> Renumera els JSON per quadrar amb el PDF exportat
    </label>
  </div>
  <div id="conjuntChipsList"></div>
</div>

<div id="status"></div>

<div id="dropzone">
  <p>Arrossega aquí el manual PDF<br>o</p>
  <label class="browse">tria un fitxer<input type="file" id="fileInput" accept="application/pdf"></label>
</div>

<div id="emptyState"></div>
<div id="grid"></div>

<footer id="footerBar">
  <span id="selCount">0 pàgines seleccionades</span>
  <div class="spacer"></div>
  <button class="primary" id="exportBtn" disabled>Genera PDF de recanvis</button>
</footer>

<div id="modalOverlay">
  <div id="modalTop">
    <button id="modalPrev">◀ Anterior</button>
    <span id="modalPageLabel"></span>
    <button id="modalNext">Següent ▶</button>
    <button id="modalToggle">Selecciona aquesta pàgina</button>
    <button id="modalPortadaBtn">Marca com a portada</button>
    <button id="modalClose">Tanca ✕</button>
    <span id="modalPickHint">🎯 Arrossega el ratolí sobre el text que vols (Esc per cancel·lar)</span>
  </div>
  <div id="modalImgWrap"><canvas id="modalCanvas"></canvas><div id="pickRect"></div></div>
</div>

<div class="overlay" id="nameModalOverlay">
  <div id="nameModalCard">
    <label for="groupNameInput" id="nameModalLabel">Nom del grup</label>
    <input type="text" id="groupNameInput" placeholder="ex: Zócalo (ZO) — bastidor">
    <div class="actions">
      <button id="nameModalCancel">Cancel·la</button>
      <button class="primary" id="nameModalCreate">Crea</button>
    </div>
  </div>
</div>

<div class="overlay" id="conjuntDetailOverlay">
  <div class="reviewCard" id="conjuntDetailCard">
    <div class="reviewTop">
      <input type="text" id="conjuntDetailNameInput">
      <button id="pickConjuntNameBtn" title="Tria el nom clicant-lo al dibuix">🎯 Nom</button>
      <input type="text" id="conjuntDetailNumInput" placeholder="Núm. de dibuix" style="width:150px;">
      <button id="pickConjuntNumBtn" title="Tria el número de dibuix clicant-lo al dibuix">🎯 Núm.</button>
      <button id="conjuntDetailCloseBtn">Tanca ✕</button>
    </div>
    <div id="grupsList"></div>
    <div id="conjuntDetailEmpty" style="display:none;">Aquest conjunt encara no té cap grup.</div>
    <button id="addGrupBtn">+ Afegeix un grup amb la selecció actual</button>
    <button id="importMenuBtn" disabled>Importa grups des d'una pàgina de menú</button>
    <div class="reviewActions" style="margin-top:16px;">
      <div class="left">
        <button id="deleteConjuntBtn">Elimina el conjunt</button>
      </div>
      <div class="right">
        <button id="exportConjuntPdfBtn">⬇ Exporta (PDF)</button>
        <button class="primary" id="exportConjuntBtn">⬇ Exporta (JSON)</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="menuImportOverlay">
  <div class="reviewCard" id="menuImportCard">
    <div class="reviewTop">
      <strong>Entrades trobades al menú</strong>
    </div>
    <div id="menuImportList"></div>
    <div class="reviewActions">
      <div class="left"></div>
      <div class="right">
        <button id="menuImportCancel">Cancel·la</button>
        <button class="primary" id="menuImportConfirm">Importa</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="grupModalOverlay">
  <div class="reviewCard">
    <div class="reviewTop">
      <input type="text" id="reviewNameInput">
      <button id="pickGrupNameBtn" title="Tria el nom clicant-lo al dibuix">🎯 Tria del dibuix</button>
      <span id="reviewPagesLabel" style="color:var(--muted); font-size:12px;"></span>
    </div>
    <div id="reviewPendingPanel">
      <p>Aquest grup encara no té cap pàgina assignada.</p>
      <button id="assignPagesBtn">Selecciona pàgines a la graella primer</button>
    </div>
    <div class="reviewThumbs" id="reviewThumbs"></div>
    <div id="subgrupsList"></div>
    <button id="addSubgrupBtn">+ Afegeix dibuix</button>
    <div class="reviewActions" style="margin-top:16px;">
      <div class="left">
        <button id="deleteGrupBtn">Elimina el grup</button>
      </div>
      <div class="right">
        <button id="reviewCancelBtn">Cancel·la</button>
        <button class="primary" id="reviewSaveBtn">Desa el grup</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
function loadScript(urls){
  return new Promise((resolve, reject)=>{
    var i=0;
    function tryNext(){
      if(i>=urls.length){reject(new Error("No s'ha pogut carregar cap script"));return;}
      var s=document.createElement('script');
      s.src=urls[i];
      s.onload=resolve;
      s.onerror=function(){ i++; tryNext(); };
      document.head.appendChild(s);
    }
    tryNext();
  });
}

var pdfjsReady = loadScript([
  'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js'
]).then(function(){
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
});

var pdfLibReady = loadScript([
  'https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js'
]);

var els = {
  header: document.getElementById('mainHeader'),
  fileInfo: document.getElementById('fileInfo'),
  status: document.getElementById('status'),
  dropzone: document.getElementById('dropzone'),
  fileInput: document.getElementById('fileInput'),
  grid: document.getElementById('grid'),
  footer: document.getElementById('footerBar'),
  selCount: document.getElementById('selCount'),
  exportBtn: document.getElementById('exportBtn'),
  rangeInput: document.getElementById('rangeInput'),
  addRangeBtn: document.getElementById('addRangeBtn'),
  selectAllBtn: document.getElementById('selectAllBtn'),
  clearSelBtn: document.getElementById('clearSelBtn'),
  newFileBtn: document.getElementById('newFileBtn'),
  modalOverlay: document.getElementById('modalOverlay'),
  modalCanvas: document.getElementById('modalCanvas'),
  modalPageLabel: document.getElementById('modalPageLabel'),
  modalPrev: document.getElementById('modalPrev'),
  modalNext: document.getElementById('modalNext'),
  modalToggle: document.getElementById('modalToggle'),
  modalClose: document.getElementById('modalClose'),
  toast: document.getElementById('toast'),
  createConjuntBtn: document.getElementById('createConjuntBtn'),
  machinePanel: document.getElementById('machinePanel'),
  machSerial: document.getElementById('machSerial'),
  machModel: document.getElementById('machModel'),
  machClient: document.getElementById('machClient'),
  portadaInfo: document.getElementById('portadaInfo'),
  portadaClearBtn: document.getElementById('portadaClearBtn'),
  importJsonBtn: document.getElementById('importJsonBtn'),
  importJsonInput: document.getElementById('importJsonInput'),
  modalPortadaBtn: document.getElementById('modalPortadaBtn'),
  conjuntsPanel: document.getElementById('conjuntsPanel'),
  conjuntChipsList: document.getElementById('conjuntChipsList'),
  exportCombinedBtn: document.getElementById('exportCombinedBtn'),
  exportCatalogBtn: document.getElementById('exportCatalogBtn'),
  nameModalOverlay: document.getElementById('nameModalOverlay'),
  nameModalLabel: document.getElementById('nameModalLabel'),
  groupNameInput: document.getElementById('groupNameInput'),
  nameModalCancel: document.getElementById('nameModalCancel'),
  nameModalCreate: document.getElementById('nameModalCreate'),
  conjuntDetailOverlay: document.getElementById('conjuntDetailOverlay'),
  conjuntDetailNameInput: document.getElementById('conjuntDetailNameInput'),
  conjuntDetailCloseBtn: document.getElementById('conjuntDetailCloseBtn'),
  grupsList: document.getElementById('grupsList'),
  conjuntDetailEmpty: document.getElementById('conjuntDetailEmpty'),
  addGrupBtn: document.getElementById('addGrupBtn'),
  importMenuBtn: document.getElementById('importMenuBtn'),
  deleteConjuntBtn: document.getElementById('deleteConjuntBtn'),
  exportConjuntBtn: document.getElementById('exportConjuntBtn'),
  exportConjuntPdfBtn: document.getElementById('exportConjuntPdfBtn'),
  exportCombinedPdfBtn: document.getElementById('exportCombinedPdfBtn'),
  exportCatalogPdfBtn: document.getElementById('exportCatalogPdfBtn'),
  remapPagesChk: document.getElementById('remapPagesChk'),
  menuImportOverlay: document.getElementById('menuImportOverlay'),
  menuImportList: document.getElementById('menuImportList'),
  menuImportCancel: document.getElementById('menuImportCancel'),
  menuImportConfirm: document.getElementById('menuImportConfirm'),
  grupModalOverlay: document.getElementById('grupModalOverlay'),
  reviewNameInput: document.getElementById('reviewNameInput'),
  pickGrupNameBtn: document.getElementById('pickGrupNameBtn'),
  pickConjuntNameBtn: document.getElementById('pickConjuntNameBtn'),
  conjuntDetailNumInput: document.getElementById('conjuntDetailNumInput'),
  pickConjuntNumBtn: document.getElementById('pickConjuntNumBtn'),
  subgrupsList: document.getElementById('subgrupsList'),
  addSubgrupBtn: document.getElementById('addSubgrupBtn'),
  modalPickHint: document.getElementById('modalPickHint'),
  modalImgWrap: document.getElementById('modalImgWrap'),
  pickRect: document.getElementById('pickRect'),
  reviewPagesLabel: document.getElementById('reviewPagesLabel'),
  reviewPendingPanel: document.getElementById('reviewPendingPanel'),
  assignPagesBtn: document.getElementById('assignPagesBtn'),
  reviewThumbs: document.getElementById('reviewThumbs'),
  deleteGrupBtn: document.getElementById('deleteGrupBtn'),
  reviewCancelBtn: document.getElementById('reviewCancelBtn'),
  reviewSaveBtn: document.getElementById('reviewSaveBtn')
};

var state = {
  pdfDoc: null,
  pdfBytes: null,
  fileName: '',
  numPages: 0,
  selected: new Set(),
  cells: [],
  modalPage: 1,
  renderQueue: [],
  activeRenders: 0,
  conjunts: [],
  machine: {serial:'',model:'',client:''},
  portadaPage: null,
  currentConjuntId: null,
  editingGrup: null,
  pendingMenuImport: null,
  pickingTarget: null, // callback while picking from the drawing
  pickingMode: 'text', // 'text' (name / number) | 'rows' (mark parts-list rows)
  pickItems: []        // per-item text geometry (canvas space) for the current modal page
};

function showToast(msg, ms){
  els.toast.textContent = msg;
  els.toast.style.display = 'block';
  clearTimeout(showToast._t);
  showToast._t = setTimeout(function(){ els.toast.style.display='none'; }, ms||2500);
}

function setStatus(msg){ els.status.textContent = msg || ''; }

// ---- File loading ----
['dragover','dragenter'].forEach(function(ev){
  els.dropzone.addEventListener(ev, function(e){ e.preventDefault(); els.dropzone.classList.add('drag'); });
});
['dragleave','drop'].forEach(function(ev){
  els.dropzone.addEventListener(ev, function(e){ e.preventDefault(); els.dropzone.classList.remove('drag'); });
});
els.dropzone.addEventListener('drop', function(e){
  var f = e.dataTransfer.files && e.dataTransfer.files[0];
  if(f) handleFile(f);
});
els.fileInput.addEventListener('change', function(e){
  var f = e.target.files[0];
  if(f) handleFile(f);
});
els.newFileBtn.addEventListener('click', function(){
  resetApp();
});

function resetApp(){
  state.pdfDoc = null; state.pdfBytes = null; state.numPages = 0;
  state.selected = new Set(); state.cells = [];
  state.conjunts = []; state.editingGrup = null; state.currentConjuntId = null;
  state.pendingMenuImport = null;
  state.machine = emptyMachine(); state.portadaPage = null;
  els.grid.innerHTML = '';
  els.header.style.display = 'none';
  els.footer.style.display = 'none';
  els.machinePanel.style.display = 'none';
  els.conjuntsPanel.style.display = 'none';
  els.conjuntChipsList.innerHTML = '';
  els.dropzone.style.display = 'block';
  els.fileInput.value = '';
  setStatus('');
}

function handleFile(file){
  if(file.type !== 'application/pdf' && !/\.pdf$/i.test(file.name)){
    showToast('El fitxer ha de ser un PDF.');
    return;
  }
  els.dropzone.style.display = 'none';
  setStatus('Carregant "' + file.name + '"…');
  state.fileName = file.name.replace(/\.pdf$/i,'');
  var reader = new FileReader();
  reader.onload = function(e){
    state.pdfBytes = new Uint8Array(e.target.result);
    loadPdf(state.pdfBytes.slice());
  };
  reader.onerror = function(){ setStatus(''); showToast('Error llegint el fitxer.'); els.dropzone.style.display='block'; };
  reader.readAsArrayBuffer(file);
}

function loadPdf(bytesForPdfjs){
  pdfjsReady.then(function(){
    return pdfjsLib.getDocument({ data: bytesForPdfjs }).promise;
  }).then(function(doc){
    state.pdfDoc = doc;
    state.numPages = doc.numPages;
    buildGrid();
    els.header.style.display = 'flex';
    els.footer.style.display = 'flex';
    els.fileInfo.textContent = state.fileName + '.pdf — ' + state.numPages + ' pàgines';
    setStatus('');
    updateSelCount();
    var cat = loadCatalogForFile(state.fileName);
    state.machine = cat.machine;
    state.portadaPage = cat.portadaPage;
    state.conjunts = cat.conjunts;
    renderMachinePanel();
    renderConjuntsPanel();
  }).catch(function(err){
    console.error(err);
    setStatus('');
    showToast('No s\'ha pogut obrir el PDF: ' + err.message);
    els.dropzone.style.display = 'block';
  });
}

// ---- Grid / thumbnails ----
function buildGrid(){
  els.grid.innerHTML = '';
  state.cells = [];
  var frag = document.createDocumentFragment();
  for(var p=1; p<=state.numPages; p++){
    var cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.page = p;

    var thumbWrap = document.createElement('div');
    thumbWrap.className = 'thumbWrap';
    var canvas = document.createElement('canvas');
    thumbWrap.appendChild(canvas);
    cell.appendChild(thumbWrap);

    var zoomBtn = document.createElement('div');
    zoomBtn.className = 'zoomBtn';
    zoomBtn.textContent = '🔍';
    zoomBtn.addEventListener('click', function(e){
      e.stopPropagation();
      openModal(parseInt(e.currentTarget.parentElement.dataset.page,10));
    });
    cell.appendChild(zoomBtn);

    var footerRow = document.createElement('div');
    footerRow.className = 'cellFooter';
    var pageNum = document.createElement('span');
    pageNum.className = 'pageNum';
    pageNum.textContent = p;
    var check = document.createElement('span');
    check.className = 'check';
    footerRow.appendChild(pageNum);
    footerRow.appendChild(check);
    cell.appendChild(footerRow);

    cell.addEventListener('click', function(e){
      toggleSelect(parseInt(e.currentTarget.dataset.page,10));
    });

    frag.appendChild(cell);
    state.cells.push({el: cell, canvas: canvas, rendered:false, page:p});
  }
  els.grid.appendChild(frag);
  setupLazyRender();
}

var io;
function setupLazyRender(){
  if(io) io.disconnect();
  io = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        var page = parseInt(entry.target.dataset.page,10);
        queueRender(page);
        io.unobserve(entry.target);
      }
    });
  }, {root:null, rootMargin:'400px 0px', threshold:0.01});
  state.cells.forEach(function(c){ io.observe(c.el); });
}

function queueRender(page){
  state.renderQueue.push(page);
  pumpRenderQueue();
}
function pumpRenderQueue(){
  while(state.activeRenders < 4 && state.renderQueue.length){
    var page = state.renderQueue.shift();
    renderThumb(page);
  }
}
function renderThumb(page){
  var cellInfo = state.cells[page-1];
  if(!cellInfo || cellInfo.rendered) return;
  cellInfo.rendered = true;
  state.activeRenders++;
  renderPageToCanvas(page, cellInfo.canvas, 220).catch(function(err){
    console.warn('Error rendering page', page, err);
  }).then(function(){
    state.activeRenders--;
    pumpRenderQueue();
  });
}

function renderPageToCanvas(page, canvas, targetWidth){
  return state.pdfDoc.getPage(page).then(function(pdfPage){
    var vp0 = pdfPage.getViewport({scale:1});
    var scale = targetWidth / vp0.width;
    var viewport = pdfPage.getViewport({scale: scale});
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    var ctx = canvas.getContext('2d');
    return pdfPage.render({canvasContext: ctx, viewport: viewport}).promise;
  });
}

function toggleSelect(page){
  var cellInfo = state.cells[page-1];
  if(state.selected.has(page)){
    state.selected.delete(page);
    cellInfo.el.classList.remove('selected');
  } else {
    state.selected.add(page);
    cellInfo.el.classList.add('selected');
  }
  updateSelCount();
  if(els.modalOverlay.classList.contains('open') && state.modalPage === page){
    updateModalToggleLabel();
  }
}

function updateSelCount(){
  var n = state.selected.size;
  els.selCount.textContent = n + (n===1 ? ' pàgina seleccionada' : ' pàgines seleccionades');
  els.exportBtn.disabled = n === 0;
  els.createConjuntBtn.disabled = n === 0;
}

// ---- Toolbar actions ----
els.selectAllBtn.addEventListener('click', function(){
  for(var p=1;p<=state.numPages;p++){
    state.selected.add(p);
    state.cells[p-1].el.classList.add('selected');
  }
  updateSelCount();
});
els.clearSelBtn.addEventListener('click', function(){
  state.selected.forEach(function(p){ state.cells[p-1].el.classList.remove('selected'); });
  state.selected.clear();
  updateSelCount();
});
els.addRangeBtn.addEventListener('click', applyRangeInput);
els.rangeInput.addEventListener('keydown', function(e){
  if(e.key === 'Enter') applyRangeInput();
});
function applyRangeInput(){
  var raw = els.rangeInput.value.trim();
  if(!raw) return;
  var parts = raw.split(',');
  var added = 0;
  parts.forEach(function(part){
    part = part.trim();
    if(!part) return;
    var m = part.match(/^(\d+)\s*-\s*(\d+)$/);
    if(m){
      var a = parseInt(m[1],10), b = parseInt(m[2],10);
      if(a>b){ var t=a; a=b; b=t; }
      for(var p=a; p<=b; p++){
        if(p>=1 && p<=state.numPages && !state.selected.has(p)){
          state.selected.add(p);
          state.cells[p-1].el.classList.add('selected');
          added++;
        }
      }
    } else if(/^\d+$/.test(part)){
      var n = parseInt(part,10);
      if(n>=1 && n<=state.numPages && !state.selected.has(n)){
        state.selected.add(n);
        state.cells[n-1].el.classList.add('selected');
        added++;
      }
    }
  });
  updateSelCount();
  els.rangeInput.value = '';
  if(added){
    var first = Math.min.apply(null, Array.from(state.selected));
    var target = state.cells[first-1];
    if(target) target.el.scrollIntoView({behavior:'smooth', block:'center'});
  }
}

// ---- Modal preview ----
function openModal(page){
  state.modalPage = page;
  els.modalOverlay.classList.add('open');
  renderModalPage(page);
}
function renderModalPage(page){
  els.modalPageLabel.textContent = 'Pàgina ' + page + ' de ' + state.numPages;
  updateModalToggleLabel();
  updateModalPortadaLabel();
  state.pdfDoc.getPage(page).then(function(pdfPage){
    var vp0 = pdfPage.getViewport({scale:1});
    var maxWidth = Math.min(window.innerWidth*0.9, 1100);
    var scale = maxWidth / vp0.width;
    var viewport = pdfPage.getViewport({scale: scale});
    els.modalCanvas.width = viewport.width;
    els.modalCanvas.height = viewport.height;
    var ctx = els.modalCanvas.getContext('2d');
    var renderP = pdfPage.render({canvasContext: ctx, viewport: viewport}).promise;
    if(state.pickingTarget){
      pdfPage.getTextContent().then(function(tc){ state.pickItems = buildPickItems(tc, viewport); });
    }
    return renderP;
  });
}
// Per-item text geometry in CANVAS space for name-picking. Each pdf.js text
// item gets its own box (x, y, w, h) so selection respects the horizontal
// position too — matching by line height alone grabbed text from anywhere on
// the same horizontal band of the sheet (dimensions, labels, title block).
function buildPickItems(tc, viewport){
  var items = [];
  tc.items.forEach(function(it){
    if(!it.str || !it.str.trim()) return;
    var t = pdfjsLib.Util.transform(viewport.transform, it.transform);
    var fh = Math.hypot(t[2], t[3]) || 12;              // font height on canvas
    var w = (it.width || 0) * viewport.scale;            // item width on canvas
    items.push({ x: t[4], y: t[5] - fh, w: w, h: fh * 1.25, str: it.str,
                 px: it.transform[4], py: it.transform[5], pw: it.width || 0 });
  });
  return items;
}
// Groups the selected items into reading-order LINES: top-to-bottom, items
// left-to-right, inserting spaces only across real visual gaps (same rule as
// getPageLines, so split words aren't broken apart).
function composeItemsLines(sel){
  var lines = [];
  sel.forEach(function(it){
    var line = null;
    for(var i=0;i<lines.length;i++){ if(Math.abs(lines[i].py - it.py) < 3){ line = lines[i]; break; } }
    if(!line){ line = {py: it.py, items: []}; lines.push(line); }
    line.items.push(it);
  });
  lines.sort(function(a,b){ return b.py - a.py; });
  return lines.map(function(l){
    l.items.sort(function(a,b){ return a.px - b.px; });
    var text = '', prevEnd = null;
    l.items.forEach(function(it){
      if(prevEnd !== null && (it.px - prevEnd) > 1) text += ' ';
      text += it.str;
      prevEnd = it.px + it.pw;
    });
    return text.replace(/\s+/g,' ').trim();
  }).filter(Boolean);
}
// One readable string (used when picking a name / a number).
function composeItemsText(sel){ return composeItemsLines(sel).join(' ').replace(/\s+/g,' ').trim(); }
// Opens `page` in the modal in picking mode: drag a rectangle over what you
// want (or plain-click a single item).
//   mode 'text' (default) — one drag, cb(text), then the modal closes.
//   mode 'rows'           — each drag calls cb(lines[], page) and picking STAYS
//                           on, so you can mark several regions / pages; Esc or
//                           closing the modal finishes.
function startPicking(page, cb, mode){
  if(!page){ showToast('Aquest element encara no té cap pàgina d\'on triar el text.'); return; }
  state.pickingTarget = cb;
  state.pickingMode = mode || 'text';
  state.pickItems = [];
  els.modalPickHint.textContent = (state.pickingMode === 'rows')
    ? '🎯 Arrossega sobre les FILES de recanvis (pots repetir i canviar de pàgina) — Esc per acabar'
    : '🎯 Arrossega el ratolí sobre el text que vols (Esc per cancel·lar)';
  els.modalPickHint.style.display = 'inline-block';
  els.modalImgWrap.classList.add('picking');
  openModal(page);
}
function endPicking(){
  state.pickingTarget = null;
  state.pickingMode = 'text';
  state.pickItems = [];
  pickDrag = null;
  els.pickRect.style.display = 'none';
  els.modalPickHint.style.display = 'none';
  els.modalImgWrap.classList.remove('picking');
}
// -- drag-rectangle selection (display-space coords relative to the canvas;
//    converted to canvas-internal space only for hit-testing) --
var pickDrag = null;
function updatePickRect(){
  var d = pickDrag; if(!d) return;
  var ox = els.modalCanvas.offsetLeft, oy = els.modalCanvas.offsetTop;
  els.pickRect.style.display = 'block';
  els.pickRect.style.left = (ox + Math.min(d.x0, d.x1)) + 'px';
  els.pickRect.style.top = (oy + Math.min(d.y0, d.y1)) + 'px';
  els.pickRect.style.width = Math.abs(d.x1 - d.x0) + 'px';
  els.pickRect.style.height = Math.abs(d.y1 - d.y0) + 'px';
}
els.modalCanvas.addEventListener('mousedown', function(e){
  if(!state.pickingTarget || e.button !== 0) return;
  e.preventDefault();
  var r = els.modalCanvas.getBoundingClientRect();
  var x = e.clientX - r.left, y = e.clientY - r.top;
  pickDrag = { x0:x, y0:y, x1:x, y1:y };
  updatePickRect();
});
document.addEventListener('mousemove', function(e){
  if(!pickDrag) return;
  var r = els.modalCanvas.getBoundingClientRect();
  pickDrag.x1 = Math.max(0, Math.min(e.clientX - r.left, r.width));
  pickDrag.y1 = Math.max(0, Math.min(e.clientY - r.top, r.height));
  updatePickRect();
});
document.addEventListener('mouseup', function(){
  if(!pickDrag || !state.pickingTarget) { pickDrag = null; return; }
  var d = pickDrag; pickDrag = null;
  els.pickRect.style.display = 'none';
  var r = els.modalCanvas.getBoundingClientRect();
  var sx = r.width ? els.modalCanvas.width / r.width : 1;
  var sy = r.height ? els.modalCanvas.height / r.height : 1;
  var x0 = Math.min(d.x0, d.x1) * sx, x1 = Math.max(d.x0, d.x1) * sx;
  var y0 = Math.min(d.y0, d.y1) * sy, y1 = Math.max(d.y0, d.y1) * sy;
  var isClick = (x1 - x0) < 6 && (y1 - y0) < 6;
  var sel;
  if(isClick){
    var cx = (x0 + x1) / 2, cy = (y0 + y1) / 2, tol = 4;
    sel = state.pickItems.filter(function(it){
      return cx >= it.x - tol && cx <= it.x + it.w + tol && cy >= it.y - tol && cy <= it.y + it.h + tol;
    });
  } else {
    sel = state.pickItems.filter(function(it){
      return it.x < x1 && it.x + it.w > x0 && it.y < y1 && it.y + it.h > y0;
    });
  }
  if(!sel.length){
    showToast(isClick ? 'Cap text just aquí — arrossega un requadre sobre el text.' : 'Cap text dins la selecció.');
    return;
  }
  // 'rows' mode stays open: each drag hands over the marked lines so you can
  // mark several regions (and pages) into the same drawing.
  if(state.pickingMode === 'rows'){
    var lines = composeItemsLines(sel);
    state.pickingTarget(lines, state.modalPage);
    return;
  }
  var text = composeItemsText(sel);
  var cb = state.pickingTarget;
  endPicking();
  closeModal();
  cb(text);
  showToast('Text triat: ' + text);
});
function updateModalToggleLabel(){
  els.modalToggle.textContent = state.selected.has(state.modalPage)
    ? '✓ Pàgina seleccionada (treu-la)'
    : 'Selecciona aquesta pàgina';
}
function updateModalPortadaLabel(){
  els.modalPortadaBtn.textContent = (state.portadaPage === state.modalPage)
    ? '✓ És la portada (treu-la)'
    : 'Marca com a portada';
}
els.modalPortadaBtn.addEventListener('click', function(){
  state.portadaPage = (state.portadaPage === state.modalPage) ? null : state.modalPage;
  persistConjunts();
  renderMachinePanel();
  updateModalPortadaLabel();
});
els.modalPrev.addEventListener('click', function(){
  if(state.modalPage > 1){ state.modalPage--; renderModalPage(state.modalPage); }
});
els.modalNext.addEventListener('click', function(){
  if(state.modalPage < state.numPages){ state.modalPage++; renderModalPage(state.modalPage); }
});
els.modalToggle.addEventListener('click', function(){

  updateModalToggleLabel();
});
els.modalClose.addEventListener('click', closeModal);
els.modalOverlay.addEventListener('click', function(e){
  if(e.target === els.modalOverlay) closeModal();
});
document.addEventListener('keydown', function(e){
  if(!els.modalOverlay.classList.contains('open')) return;
  // stopImmediatePropagation: the later document-level Escape handler runs on
  // this same event and would see the modal as already closed — without this,
  // Esc while picking would also cancel the grup review underneath.
  if(e.key === 'Escape'){ closeModal(); e.stopImmediatePropagation(); return; }
  if(e.key === 'ArrowLeft') els.modalPrev.click();
  if(e.key === 'ArrowRight') els.modalNext.click();
  if(e.key === ' '){ e.preventDefault(); els.modalToggle.click(); }
});
function closeModal(){
  els.modalOverlay.classList.remove('open');

}
els.pickGrupNameBtn.addEventListener('click', function(){

  startPicking(pages && pages[0], function(text){ els.reviewNameInput.value = stripTitleLabel(text); });

function firstPageOfConjunt(conjuntId){
  var c = state.conjunts.find(function(x){ return x.id === conjuntId; });
  if(!c) return null;
  for(var i=0;i<c.grups.length;i++){ if(c.grups[i].pages && c.grups[i].pages.length) return c.grups[i].pages[0]; }

}
// Setting an input's value programmatically doesn't fire its 'input' listener,
// so picked conjunt fields write to the model and persist explicitly.
els.pickConjuntNameBtn.addEventListener('click', function(){

// ---- Catalog (spare parts) ----
// Data model, matching the manual's own terminology:
//   Conjunt (top)   — a whole equipment/sub-manual, e.g. "Fusor Micron",
//                      "Cos principal (Anexo 1)". Just a named container.
//   Grup (leaf)     — one specific drawing, e.g. "A. Conjunto Depósito" or
//                      "Zócalo". Has pages + an editable rows table. Can
//                      exist "pending" (no pages yet) when bulk-created from
//                      a menu page — see extractMenuHeadings().
//   Subgrup         — NOT a separate container: it's a per-row field, since
//                      in the source pages GRUPO/SUBGRUPO are two metadata
//                      fields describing the SAME single drawing (e.g. page
//                      87: GRUPO=Zócalo, SUBGRUPO="Bancada Dr.").
var CATALOG_LS_KEY = 'rs_catalog_v3';

function loadAllCatalogs(){
  try{ return JSON.parse(localStorage.getItem(CATALOG_LS_KEY) || '{}'); }
  catch(e){ return {}; }
}
function emptyMachine(){ return {serial:'', model:'', client:''}; }
// A stored catalog is now { machine, portadaPage, conjunts }. Older stores
// held just the bare conjunts array — migrate those on read.
function loadCatalogForFile(fileName){
  var raw = loadAllCatalogs()[fileName];
  if(!raw) return { machine:emptyMachine(), portadaPage:null, conjunts:[] };
  if(Array.isArray(raw)) return { machine:emptyMachine(), portadaPage:null, conjunts:normalizeConjunts(raw) };
  return {
    machine: Object.assign(emptyMachine(), raw.machine || {}),
    portadaPage: raw.portadaPage || null,
    conjunts: normalizeConjunts(raw.conjunts || [])
  };
}
// Migrates stored conjunts to the current hierarchy:
//   Conjunt {name, num} > Grup {name, pages} > Subgrup {name, rows}.
// Older grups held a flat rows[] where each row carried grup/subgrup/
// subgrupNum text fields — those rows are regrouped into Subgrup containers
// by their subgrup value, and the first subgrupNum found is hoisted up as the
// conjunt's drawing number (it was the same title-block Nº on every sheet).
function normalizeConjunts(conjunts){
  (conjunts||[]).forEach(function(c){
    if(c.num === undefined || c.num === null) c.num = '';
    (c.grups||[]).forEach(function(g){
      if(!g.subgrups){
        var subs = [], byName = {};
        (g.rows||[]).forEach(function(r){
          var key = r.subgrup || '';
          if(!byName[key]){ byName[key] = {id:uid(), name:key, num:r.subgrupNum||'', rows:[]}; subs.push(byName[key]); }
          if(!byName[key].num && r.subgrupNum) byName[key].num = r.subgrupNum;
          if(!c.num && r.subgrupNum) c.num = r.subgrupNum;
          byName[key].rows.push({pos:r.pos||'', ref:r.ref||'', cant:r.cant||'', denominacio:r.denominacio||'', page:r.page});
        });
        g.subgrups = subs;
        delete g.rows;
      }
      // Each Dibuix needs its own Nº + explicit page range. Catalogs built
      // before those existed get a block range derived from their rows, so
      // they work without re-extracting (and stay editable by hand).
      var needBlocks = (g.subgrups||[]).some(function(sg){ return !Array.isArray(sg.pages) || !sg.pages.length; });
      (g.subgrups||[]).forEach(function(sg){
        if(sg.num === undefined || sg.num === null) sg.num = '';
        if(!Array.isArray(sg.pages)) sg.pages = [];
        sg.srcPages = sg.rows.map(function(r){ return r.page; }).filter(function(p){ return p != null; });
      });
      if(needBlocks) assignBlockPages(g.subgrups||[], (g.pages||[]).slice());
      (g.subgrups||[]).forEach(function(sg){ delete sg.srcPages; });
    });
  });
  return conjunts;
}
function grupRowCount(g){
  return (g.subgrups||[]).reduce(function(sum,sg){ return sum + sg.rows.length; }, 0);
}
function persistConjunts(){
  var all = loadAllCatalogs();
  all[state.fileName] = { machine: state.machine, portadaPage: state.portadaPage, conjunts: state.conjunts };
  localStorage.setItem(CATALOG_LS_KEY, JSON.stringify(all));
}
function uid(){
  return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}

// -- Page text helper: reconstructs reading-order lines from pdf.js text
//    items, grouping by Y coordinate. Shared by row extraction and name
//    suggestion so both see the same line reconstruction. --
function getPageLines(page){
  return state.pdfDoc.getPage(page).then(function(pdfPage){
    return pdfPage.getTextContent();
  }).then(function(tc){
    var lines = [];
    tc.items.forEach(function(it){
      var str = it.str;
      if(!str || !str.trim()) return;
      var x = it.transform[4], y = it.transform[5];
      var line = null;
      for(var i=0;i<lines.length;i++){
        if(Math.abs(lines[i].y - y) < 3){ line = lines[i]; break; }
      }
      if(!line){ line = {y:y, items:[]}; lines.push(line); }
      line.items.push({x:x, w:it.width||0, str:str});
    });
    lines.sort(function(a,b){ return b.y - a.y; }); // top-to-bottom (PDF space: y grows upward)
    return lines.map(function(l){
      l.items.sort(function(a,b){ return a.x - b.x; });
      // Only insert a space when there's an actual visual gap between text
      // runs — some fonts in this manual split a single word into several
      // adjacent runs with ~0 gap (e.g. "ZÓCA"+"LO"), and joining every run
      // with a literal space would wrongly break those words apart.
      var text = '', prevEnd = null;
      l.items.forEach(function(it){
        if(prevEnd !== null && (it.x - prevEnd) > 1) text += ' ';
        text += it.str;
        prevEnd = it.x + it.w;
      });
      return text.replace(/\s+/g,' ').trim();
    }).filter(Boolean);
  });
}

// -- Text extraction heuristic (deliberately simple; the review table is what
//    guarantees quality, since column layouts vary between manual sections) --
function extractRowsFromPage(page){
  return getPageLines(page).then(function(lines){
    // Only keep real part rows — those with BOTH a position and a reference.
    // Everything else on a drawing sheet (title boxes, list headers, loose
    // dimension/label text) has no Pos+Ref and would just be noise.
    return lines.map(function(text){ return parseLineToRow(text, page); })
                .filter(function(r){ return r.pos && r.ref; });
  });
}

// A page's own "SUBGRUPO <name>" title-block field, when present.
function extractSubgrupFromPage(page){
  return getPageLines(page).then(function(lines){
    lines = lines.filter(function(l){ return !/MANUAL\s+DE\s+INSTRU/i.test(l); });
    for(var i=0;i<lines.length;i++){
      var m = lines[i].match(/\bSUBGRUPO\s+(.+)$/i);
      if(m) return m[1].trim();
    }
    return '';
  }).catch(function(){ return ''; });
}

// The drawing's own reference code from the title block "Nº" field, e.g.
// "4726-01-00". In the reconstructed text this value ends up on the same
// line as the DIN paper-size code right before it (e.g. "A-4 4726-01-00"),
// so anchoring on that prefix avoids matching a part's own reference code
// elsewhere on the page (individual parts can have similarly-shaped codes
// like "4726-01-01").
function extractSubgrupNumFromPage(page){
  return getPageLines(page).then(function(lines){
    for(var i=0;i<lines.length;i++){
      // The code after the DIN paper-size prefix (e.g. "A-4 …"). Capture a
      // dash-separated code whose segments may be letters and/or digits
      // ("4726-01-00", "ZO-200-95", "AB-1234-01"), not just all-digit ones.
      var m = lines[i].match(/[A-Z]-\d+\s+([A-Z0-9]+(?:-[A-Z0-9]+)+)/);
      if(m) return m[1];
    }
    return '';
  }).catch(function(){ return ''; });
}

// Title-block labels are not part of the name itself: picking or extracting
// "SUBGRUPO BANCADA DR." should yield "BANCADA DR.".
function stripTitleLabel(s){
  return (s||'').replace(/^\s*(GRUPO|SUBGRUPO|CONJUNTO|GRUP|SUBGRUP|CONJUNT)\s*[:.\-]?\s*/i, '').trim();
}
// Pulls a drawing-number-looking code out of a clicked line: prefers the code
// after the DIN paper-size prefix ("A-4 ZO-200-95"), else any dash-code.
function extractCodeFromLine(text){
  var m = (text||'').match(/[A-Z]-\d+\s+([A-Z0-9]+(?:-[A-Z0-9]+)+)/);
  if(m) return m[1];
  m = (text||'').match(/([A-Z0-9]+(?:-[A-Z0-9]+)+)/);
  return m ? m[1] : (text||'').trim();
}
// Parts within a drawing are numbered by their position on the sheet; the raw
// text stream returns them in reading order, which isn't necessarily 1,2,3…
// Sort each list by the numeric Pos. value ascending so the extracted rows
// follow the drawing's own numbering. Non-numeric or blank Pos. values sink to
// the bottom keeping their original relative order (Array.sort is stable).
function posSortKey(v){
  var n = parseFloat(String(v == null ? '' : v).replace(',', '.'));
  return isNaN(n) ? Infinity : n;
}
function sortRowsByPos(rows){
  rows.sort(function(a, b){ return posSortKey(a.pos) - posSortKey(b.pos); });
  return rows;
}

// Builds the Dibuix (subgrup) containers for a set of pages: one per page,
// named after the page's own SUBGRUPO title-block field and tagged with that
// sheet's Nº, holding that page's part rows. Consecutive pages with the same
// name are merged into one drawing (a parts list spanning several sheets).
// Everything here is only a STARTING POINT — name, Nº, pages and rows are all
// editable/markable by hand in the review modal.
function buildSubgrupsForPages(pages){
  return Promise.all(pages.map(function(p){
    return Promise.all([extractRowsFromPage(p), extractSubgrupFromPage(p), extractSubgrupNumFromPage(p)]).then(function(res){
      return { page: p, name: stripTitleLabel(res[1] || ''), num: res[2] || '', rows: res[0] };
    });
  })).then(function(perPage){
    var subs = [];
    perPage.forEach(function(pp){
      var last = subs[subs.length-1];
      if(last && last.name === pp.name){ last.rows = last.rows.concat(pp.rows); last.srcPages.push(pp.page); if(!last.num) last.num = pp.num; }
      else subs.push({ id: uid(), name: pp.name, num: pp.num, rows: pp.rows, srcPages: [pp.page] });
    });
    subs.forEach(function(sg){ sortRowsByPos(sg.rows); });
    assignBlockPages(subs, pages);
    subs.forEach(function(sg){ delete sg.srcPages; });
    return subs;
  });
}
// In this manual a drawing is laid out as: the drawing sheet first, then its
// parts lists, until the next drawing starts. So each drawing's page range runs
// from just after the previous drawing's last list page through its own last
// list page — that way the sheet carrying the balloons is inside the range.
// Drawings with no rows of their own keep just the pages they came from.
function assignBlockPages(subs, allPages){
  var sorted = allPages.slice().sort(function(a,b){ return a-b; });
  var gStart = sorted.length ? sorted[0] : null, cursor = null;
  subs.forEach(function(sg){
    var src = (sg.srcPages || []).slice().sort(function(a,b){ return a-b; });
    var rowPages = sg.rows.map(function(r){ return r.page; }).filter(function(p){ return p != null; });
    var last = rowPages.length ? Math.max.apply(null, rowPages) : (src.length ? src[src.length-1] : null);
    var first = rowPages.length ? Math.min.apply(null, rowPages) : (src.length ? src[0] : null);
    if(last == null){ if(!sg.pages || !sg.pages.length) sg.pages = src; return; }
    var start = (cursor != null) ? cursor + 1 : (gStart != null ? Math.min(gStart, first) : first);
    if(start > first) start = first;
    if(!sg.pages || !sg.pages.length){ // never clobber a range set by hand
      var pages = [];
      for(var p = start; p <= last; p++) pages.push(p);
      sg.pages = pages;
    }
    cursor = last;
  });
}

// Collects every menu-style numbered heading on a page, e.g. a text index
// page listing "A1.1.- SECCIÓN DEL ZÓCALO...", "A1.2.- SECCIÓN DE LA
// MESA...", one per line — used to bulk-import several Grup names at once.
function extractMenuHeadings(page){
  return getPageLines(page).then(function(lines){
    lines = lines.filter(function(l){ return !/MANUAL\s+DE\s+INSTRU/i.test(l); });
    var names = [];
    lines.forEach(function(l){
      var m = l.match(/^[A-Z]?\d+(?:\s*\.\s*\d+)*\s*\.\s*-\s*(.+)$/);
      if(m){
        var name = m[1].replace(/\s*\.+\s*$/, '').trim();
        if(name) names.push(name);
      }
    });
    return names;
  }).catch(function(){ return []; });
}

// -- Suggest a name from the drawing's own title text: sections copied from
//    the Meler/Micron sub-manuals have a heading like "A. CONJUNTO DEPÓSITO";
//    the main machine's drawing sheets have a "GRUPO <name>" / "SUBGRUPO
//    <name>" label in the title block instead. Only looks at the first page
//    of the selection — always editable before confirming. --
function suggestNameFromPages(pages){
  if(!pages.length) return Promise.resolve('');
  return getPageLines(pages[0]).then(function(lines){
    // Every page repeats a running header like "<chapter> MANUAL DE
    // INSTRUCCIONES SECCIÓN <n>" — never a useful name, and it can contain
    // stray "ANEXO n -" text that would otherwise shadow the real title.
    lines = lines.filter(function(l){ return !/MANUAL\s+DE\s+INSTRU/i.test(l); });
    for(var i=0;i<lines.length;i++){
      if(/^[A-Z]\.?\s*CONJUNTO\s+.+/i.test(lines[i])) return titleCaseEs(lines[i]);
    }
    // Section/subsection title pages (a "portada" page before the actual
    // drawing) use this manual's numbered-heading convention throughout,
    // e.g. "A1 .1 .- ZÓCALO (ZO) - (BASTIDOR)." or "1.4.3.- SECCIÓN
    // VIS-SIN-FIN (VSF).". Some headings have stray spaces around the dots
    // (a font-kerning quirk in the source PDF), hence the \s* tolerance.
    for(var i=0;i<lines.length;i++){
      var mh = lines[i].match(/^[A-Z]?\d+(?:\s*\.\s*\d+)*\s*\.\s*-\s*(.+)$/);
      if(mh) return mh[1].replace(/\s*\.+\s*$/, '').trim();
    }
    for(var i=0;i<lines.length;i++){
      var mAnexo = lines[i].match(/^ANEXO\s+\d+\s*[:.\-]\s*(.+)$/i);
      if(mAnexo) return titleCaseEs(mAnexo[1].replace(/\s*\.+\s*$/, '').trim());
    }
    for(var i=0;i<lines.length;i++){
      var m = lines[i].match(/\bGRUPO\s+(.+)$/i);
      if(m) return m[1].trim();
    }
    for(var i=0;i<lines.length;i++){
      var m = lines[i].match(/\bSUBGRUPO\s+(.+)$/i);
      if(m) return m[1].trim();
    }
    return '';
  }).catch(function(){ return ''; });
}
function titleCaseEs(s){
  return s.trim().toLowerCase().replace(/(^|\s)([a-záéíóúñ])/g, function(m,sp,c){ return sp + c.toUpperCase(); });
}

function parseLineToRow(text, page){
  var tokens = text.split(' ');
  var pos = '', ref = '', cant = '', denomParts = [];
  var posSet = false, cantSet = false;
  tokens.forEach(function(tok){
    if(!posSet && /^\d+(\.\d+)?$/.test(tok)){ pos = tok; posSet = true; return; }
    if(!ref && /^\d{6,}$/.test(tok)){ ref = tok; return; }
    if(posSet && !cantSet && /^\d+$/.test(tok) && tok.length < 6){ cant = tok; cantSet = true; return; }
    denomParts.push(tok);
  });
  // Fallback: some sections encode the part code as a trailing alphanumeric
  // token with dashes (e.g. "ZO-200-95", "4726-01-01") instead of a plain
  // 6+ digit number — pull it out of the denomination if nothing matched yet.
  if(!ref && denomParts.length){
    var last = denomParts[denomParts.length-1];
    if(/^[A-Za-z0-9]+-[A-Za-z0-9-]+$/.test(last) && /\d/.test(last)){
      ref = last;
      denomParts = denomParts.slice(0, -1);
    }
  }
  return {pos:pos, ref:ref, cant:cant, denominacio:denomParts.join(' '), page:page};
}

// -- Name modal: shared by "create a Conjunt" and "add a Grup to a Conjunt" --
var pendingNameAction = null; // 'newconjunt' | 'grup'
var pendingConjuntId = null;
var pendingPages = null;

// "Crea un conjunt" creates the Conjunt and its first Grup together in one
// step — the name asked for (and imported from the title page) is the
// Grup's name, since that's the meaningful unit tied to a drawing. The
// Conjunt starts out with the same name and can be renamed later from its
// detail view.
els.createConjuntBtn.addEventListener('click', function(){
  if(state.selected.size === 0) return;
  pendingNameAction = 'newconjunt';
  pendingConjuntId = null;
  pendingPages = Array.from(state.selected).sort(function(a,b){ return a-b; });
  openNameModalWithSuggestion('Nom del grup', pendingPages, els.createConjuntBtn);
});

// Resolves the suggested name BEFORE showing the modal, so the field is
// already filled in when it appears (no race with the user clicking "Crea").
function openNameModalWithSuggestion(label, pages, btn){
  var originalLabel = btn ? btn.textContent : null;
  if(btn){ btn.disabled = true; btn.textContent = 'Cercant nom…'; }
  suggestNameFromPages(pages).then(function(name){
    if(btn){ btn.disabled = false; btn.textContent = originalLabel; }
    els.nameModalLabel.textContent = label;
    els.groupNameInput.value = name || '';
    els.nameModalOverlay.classList.add('open');
    els.groupNameInput.focus();
    els.groupNameInput.select();
  });
}
els.nameModalCancel.addEventListener('click', cancelNameModal);
els.nameModalOverlay.addEventListener('click', function(e){
  if(e.target === els.nameModalOverlay) cancelNameModal();
});
function closeNameModal(){
  els.nameModalOverlay.classList.remove('open');
  pendingNameAction = null; pendingConjuntId = null; pendingPages = null;
}
function cancelNameModal(){
  var action = pendingNameAction, conjuntId = pendingConjuntId;
  closeNameModal();
  if(action === 'grup' && conjuntId) openConjuntDetail(conjuntId);
}
els.groupNameInput.addEventListener('keydown', function(e){
  if(e.key === 'Enter') els.nameModalCreate.click();
});
els.nameModalCreate.addEventListener('click', function(){
  var name = els.groupNameInput.value.trim();
  if(!name){ showToast('Posa un nom.'); return; }
  var action = pendingNameAction, conjuntId = pendingConjuntId, pages = pendingPages;
  els.nameModalOverlay.classList.remove('open');
  pendingNameAction = null; pendingConjuntId = null; pendingPages = null;
  if(action === 'newconjunt') createConjuntWithGrup(name, pages);
  else if(action === 'grup') addGrupToConjunt(conjuntId, name, pages, false);
});

function createConjuntWithGrup(name, pages){
  var conjunt = {id: uid(), name: name, num: '', grups: []};
  state.conjunts.push(conjunt);
  addGrupToConjunt(conjunt.id, name, pages, true);
}

function deleteConjunt(id){
  state.conjunts = state.conjunts.filter(function(c){ return c.id !== id; });
  persistConjunts();
  renderConjuntsPanel();
}

// -- Conjunts panel (top level) --
function renderMachinePanel(){
  els.machinePanel.style.display = 'flex';
  els.machSerial.value = state.machine.serial || '';
  els.machModel.value = state.machine.model || '';
  els.machClient.value = state.machine.client || '';
  if(state.portadaPage){
    els.portadaInfo.textContent = 'Portada: pàg. ' + state.portadaPage + ' (clica per veure)';
    els.portadaInfo.style.cursor = 'pointer';
    els.portadaClearBtn.style.display = 'inline-block';
  } else {
    els.portadaInfo.textContent = 'Portada: — (marca-la des de la vista d\'una pàgina)';
    els.portadaInfo.style.cursor = 'default';
    els.portadaClearBtn.style.display = 'none';
  }
}
// machine fields: update state live, persist on blur/enter (avoid rewriting the
// whole catalog on every keystroke)
[['machSerial','serial'],['machModel','model'],['machClient','client']].forEach(function(pair){
  els[pair[0]].addEventListener('input', function(){ state.machine[pair[1]] = els[pair[0]].value; });
  els[pair[0]].addEventListener('change', function(){ persistConjunts(); });
});
els.portadaClearBtn.addEventListener('click', function(){ state.portadaPage = null; persistConjunts(); renderMachinePanel(); });
els.portadaInfo.addEventListener('click', function(){ if(state.portadaPage) openModal(state.portadaPage); });

function renderConjuntsPanel(){
  els.conjuntsPanel.style.display = state.conjunts.length ? 'block' : 'none';
  els.conjuntChipsList.innerHTML = '';
  state.conjunts.forEach(function(c){
    var chip = document.createElement('div');
    chip.className = 'conjuntChip';
    var nameEl = document.createElement('div');
    nameEl.className = 'gName';
    nameEl.textContent = c.name + (c.num ? ' · ' + c.num : '');
    var rowCount = c.grups.reduce(function(sum,g){ return sum + grupRowCount(g); }, 0);
    var metaEl = document.createElement('div');
    metaEl.className = 'gMeta';
    metaEl.textContent = c.grups.length + (c.grups.length===1?' grup · ':' grups · ') +
      rowCount + (rowCount===1?' fila':' files');
    var delBtn = document.createElement('button');
    delBtn.className = 'gDel';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', function(e){
      e.stopPropagation();
      deleteConjunt(c.id);
    });
    chip.appendChild(nameEl);
    chip.appendChild(metaEl);
    chip.appendChild(delBtn);
    chip.addEventListener('click', function(){ openConjuntDetail(c.id); });
    els.conjuntChipsList.appendChild(chip);
  });
}

// -- Conjunt detail modal: lists the conjunt's grups, lets you add a new one
//    from the pages currently checked in the main grid, or bulk-import
//    several from a menu/index page --
function openConjuntDetail(conjuntId){
  var c = state.conjunts.find(function(x){ return x.id === conjuntId; });
  if(!c) return;
  state.currentConjuntId = conjuntId;
  els.conjuntDetailNameInput.value = c.name;
  els.conjuntDetailNumInput.value = c.num || '';
  renderGrupsList(c);
  els.conjuntDetailOverlay.classList.add('open');
}
function closeConjuntDetail(){
  els.conjuntDetailOverlay.classList.remove('open');
  state.currentConjuntId = null;
}
function renderGrupsList(c){
  els.grupsList.innerHTML = '';
  els.conjuntDetailEmpty.style.display = c.grups.length ? 'none' : 'block';
  var n = state.selected.size;
  els.addGrupBtn.textContent = n
    ? '+ Afegeix un grup amb la selecció actual (' + n + (n===1?' pàgina)':' pàgines)')
    : '+ Afegeix un grup (selecciona pàgines a la graella primer)';
  els.addGrupBtn.disabled = n === 0;
  els.importMenuBtn.disabled = n !== 1;
  c.grups.forEach(function(g){
    var row = document.createElement('div');
    row.className = 'grupRow' + (g.pages.length ? '' : ' pending');
    var info = document.createElement('div');
    info.className = 'cInfo';
    var nameEl = document.createElement('span');
    nameEl.className = 'cName';
    nameEl.textContent = g.name;
    var metaEl = document.createElement('span');
    metaEl.className = 'cMeta';
    var rc = grupRowCount(g), sgc = (g.subgrups||[]).length;
    metaEl.textContent = g.pages.length
      ? ('Pàg. ' + g.pages.join(', ') + ' · ' + sgc + (sgc===1?' subgrup · ':' subgrups · ') + rc + (rc===1?' fila':' files'))
      : 'Pendent d\'assignar pàgines';
    info.appendChild(nameEl); info.appendChild(metaEl);
    var delBtn = document.createElement('button');
    delBtn.className = 'cDel';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', function(e){
      e.stopPropagation();
      deleteGrup(c.id, g.id);
    });
    row.appendChild(info);
    row.appendChild(delBtn);
    row.addEventListener('click', function(){ openGrupReview(c.id, g.id, false); });
    els.grupsList.appendChild(row);
  });
}
els.conjuntDetailCloseBtn.addEventListener('click', closeConjuntDetail);
els.conjuntDetailOverlay.addEventListener('click', function(e){
  if(e.target === els.conjuntDetailOverlay) closeConjuntDetail();
});
els.conjuntDetailNameInput.addEventListener('input', function(){
  var c = state.conjunts.find(function(x){ return x.id === state.currentConjuntId; });
  if(c) c.name = els.conjuntDetailNameInput.value;
});
els.conjuntDetailNameInput.addEventListener('blur', function(){
  var name = els.conjuntDetailNameInput.value.trim();
  if(!name){ showToast('Posa un nom al conjunt.'); return; }
  persistConjunts();
  renderConjuntsPanel();
});
els.conjuntDetailNumInput.addEventListener('input', function(){
  var c = state.conjunts.find(function(x){ return x.id === state.currentConjuntId; });
  if(c) c.num = els.conjuntDetailNumInput.value.trim();
});
els.conjuntDetailNumInput.addEventListener('blur', function(){
  persistConjunts();
  renderConjuntsPanel();
});
els.deleteConjuntBtn.addEventListener('click', function(){
  var conjuntId = state.currentConjuntId;
  closeConjuntDetail();
  deleteConjunt(conjuntId);
});
els.addGrupBtn.addEventListener('click', function(){
  if(state.selected.size === 0) return;
  pendingNameAction = 'grup';
  pendingConjuntId = state.currentConjuntId;
  pendingPages = Array.from(state.selected).sort(function(a,b){ return a-b; });
  els.conjuntDetailOverlay.classList.remove('open'); // avoid stacking two overlays
  openNameModalWithSuggestion('Nom del grup', pendingPages, els.addGrupBtn);
});

function addGrupToConjunt(conjuntId, name, pages, isNewConjunt){
  var c = state.conjunts.find(function(x){ return x.id === conjuntId; });
  if(!c) return;
  setStatus('Extraient text de ' + pages.length + ' pàgines…');
  Promise.all([
    buildSubgrupsForPages(pages),
    c.num ? Promise.resolve('') : extractSubgrupNumFromPage(pages[0]) // fill a missing conjunt Nº from the sheet's title block
  ]).then(function(res){
    var grup = {id: uid(), name: name, pages: pages, subgrups: res[0]};
    if(!c.num && res[1]) c.num = res[1];
    c.grups.push(grup);
    persistConjunts();
    renderConjuntsPanel();
    setStatus('');
    openGrupReview(conjuntId, grup.id, true, !!isNewConjunt);
  }).catch(function(err){
    console.error(err);
    setStatus('');
    showToast('Error extraient el text: ' + err.message, 4000);
    if(isNewConjunt) deleteConjunt(conjuntId);
  });
}

function deleteGrup(conjuntId, grupId){
  var c = state.conjunts.find(function(x){ return x.id === conjuntId; });
  if(!c) return;
  c.grups = c.grups.filter(function(g){ return g.id !== grupId; });
  persistConjunts();
  renderConjuntsPanel();
  if(els.conjuntDetailOverlay.classList.contains('open') && state.currentConjuntId === conjuntId){
    renderGrupsList(c);
  }
}

// -- Import several Grups at once from a menu/index page --
els.importMenuBtn.addEventListener('click', function(){
  if(state.selected.size !== 1) return;
  var page = Array.from(state.selected)[0];
  var conjuntId = state.currentConjuntId;
  setStatus('Llegint la pàgina de menú…');
  extractMenuHeadings(page).then(function(names){
    setStatus('');
    if(!names.length){
      showToast('No s\'han trobat entrades de menú en aquesta pàgina.', 4000);
      return;
    }
    openMenuImportModal(conjuntId, names);
  }).catch(function(err){
    setStatus('');
    showToast('Error llegint la pàgina: ' + err.message, 4000);
  });
});

function openMenuImportModal(conjuntId, names){
  state.pendingMenuImport = {conjuntId: conjuntId, names: names};
  els.menuImportList.innerHTML = '';
  names.forEach(function(name, idx){
    var row = document.createElement('label');
    row.className = 'menuImportRow';
    var cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = true; cb.dataset.idx = idx;
    var span = document.createElement('span');
    span.textContent = name;
    row.appendChild(cb); row.appendChild(span);
    els.menuImportList.appendChild(row);
  });

// "2,3,4,5,6,9" -> "2-6, 9"  and back, for the per-drawing page range field.
function pagesToRangeStr(pages){
  var p = (pages||[]).slice().sort(function(a,b){ return a-b; });
  if(!p.length) return '';
  var out = [], start = p[0], prev = p[0];
  for(var i=1;i<=p.length;i++){
    var cur = p[i];
    if(cur !== prev+1){ out.push(start === prev ? String(start) : (start+'-'+prev)); start = cur; }
    prev = cur;
  }
  return out.join(', ');
}
function rangeStrToPages(str){
  var out = [];
  (str||'').split(',').forEach(function(part){
    part = part.trim(); if(!part) return;
    var m = part.match(/^(\d+)\s*-\s*(\d+)$/);
    if(m){ var a = parseInt(m[1],10), b = parseInt(m[2],10); if(a>b){ var t=a; a=b; b=t; } for(var p=a;p<=b;p++) out.push(p); }
    else if(/^\d+$/.test(part)) out.push(parseInt(part,10));
  });
  return out.filter(function(v,i,arr){ return arr.indexOf(v) === i; }).sort(function(a,b){ return a-b; });
}
// The sheet to open when picking from this drawing: its first page (the drawing
// sheet itself, since the range starts there), else where its rows came from.
function firstPageOf(sg, eg){
  if(sg.pages && sg.pages.length) return sg.pages[0];
  if(sg.rows && sg.rows.length && sg.rows[0].page) return sg.rows[0].page;
  return (eg && eg.pages && eg.pages[0]) || null;
}

// -- Export JSON (one file per conjunt) --
function sanitizeFn(s){ return (s||'').toString().trim().replace(/[\/\\:*?"<>|]/g,'_').replace(/\s+/g,'_'); }
function serializeConjunt(c){
  return {
    name: c.name,
    num: c.num || '',
    grups: c.grups.map(function(g){
      return {name:g.name, pages:g.pages, subgrups:(g.subgrups||[]).map(function(sg){
        // num + pages make each drawing self-contained: the field app maps a
        // page straight to its drawing and parts, with nothing to infer.
        return {name:sg.name, num:sg.num||'', pages:sg.pages||[], rows:sg.rows};
      })};
    })
  };
}
// Every page a conjunt covers: its grups' selections plus each drawing's own
// range — that's exactly what its exported PDF contains.
function conjuntPages(c){
  var set = {};
  (c.grups||[]).forEach(function(g){
    (g.pages||[]).forEach(function(p){ set[p] = 1; });
    (g.subgrups||[]).forEach(function(sg){ (sg.pages||[]).forEach(function(p){ set[p] = 1; }); });
  });
  return Object.keys(set).map(Number).sort(function(a,b){ return a-b; });
}
function allConjuntsPages(){
  var set = {};
  state.conjunts.forEach(function(c){ conjuntPages(c).forEach(function(p){ set[p] = 1; }); });
  return Object.keys(set).map(Number).sort(function(a,b){ return a-b; });
}
// An exported PDF always renumbers from 1, so a JSON meant to pair with it must
// have its page numbers moved onto that PDF's numbering (125,126,127 -> 1,2,3).
// Mutates the passed (already cloned) payload.
function remapSerialized(sc, pages){
  var map = {};
  pages.forEach(function(p, i){ map[p] = i + 1; });
  (sc.grups||[]).forEach(function(g){
    g.pages = (g.pages||[]).map(function(p){ return map[p]; }).filter(Boolean);
    (g.subgrups||[]).forEach(function(sg){
      sg.pages = (sg.pages||[]).map(function(p){ return map[p]; }).filter(Boolean);
      (sg.rows||[]).forEach(function(r){ if(r.page != null && map[r.page]) r.page = map[r.page]; });
    });
  });
  return sc;
}
function remapOn(){ return !!(els.remapPagesChk && els.remapPagesChk.checked); }
function conjuntPayload(c){
  var idx = state.conjunts.indexOf(c);
  var sc = serializeConjunt(c), pages = null;
  if(remapOn()){
    pages = conjuntPages(c);
    sc = remapSerialized(JSON.parse(JSON.stringify(sc)), pages); // clone: never touch live state
  }
  return {
    exportedAt: new Date().toISOString(),
    sourceFile: pages ? (conjuntBaseName(c, idx) + '.pdf') : (state.fileName + '.pdf'),
    pagesRenumbered: !!pages,
    machine: state.machine,
    portadaPage: pages ? null : state.portadaPage, // the cover isn't in the conjunt's PDF
    conjunt: sc
  };
}
// Whole-catalog payload: every conjunt in a single file. importCatalogJson
// already reads this {conjunts:[…]} shape, so the combined export round-trips.
function catalogPayload(){
  var scs = state.conjunts.map(serializeConjunt), pages = null;
  if(remapOn()){
    pages = allConjuntsPages();
    scs = JSON.parse(JSON.stringify(scs)).map(function(sc){ return remapSerialized(sc, pages); });
  }
  return {
    exportedAt: new Date().toISOString(),
    sourceFile: pages ? (combinedPdfFileName()) : (state.fileName + '.pdf'),
    pagesRenumbered: !!pages,
    machine: state.machine,
    portadaPage: pages ? null : state.portadaPage,
    conjunts: scs
  };
}
// Named after whatever PDF it pairs with: the source manual (…/Foo.pdf →
// Foo.json), or the exported extract when the pages have been renumbered.
function catalogFileName(){
  var base = state.fileName || 'recanvis';
  return remapOn() ? (base + '_recanvis.json') : (base + '.json');
}
function combinedPdfFileName(){ return (state.fileName || 'recanvis') + '_recanvis.pdf'; }
function downloadJson(obj, filename){
  var blob = new Blob([JSON.stringify(obj, null, 2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
}
// {núm màquina}_{núm conjunt}_recanvis — fall back to name/index when a piece
// is missing so files never collide. The .json and .pdf share this base, so a
// conjunt's pair is obvious in the folder.
function conjuntBaseName(c, idx){
  var serial = sanitizeFn(state.machine.serial) || 'maquina';
  var num = sanitizeFn(c.num) || sanitizeFn(c.name) || ('conjunt' + ((idx||0)+1));
  return serial + '_' + num + '_recanvis';
}
function conjuntFileName(c, idx){ return conjuntBaseName(c, idx) + '.json'; }
function conjuntPdfFileName(c, idx){ return conjuntBaseName(c, idx) + '.pdf'; }
function exportConjunt(c, idx){
  downloadJson(conjuntPayload(c), conjuntFileName(c, idx));
}
// -- PDF extraction (shared by the footer selection export and the per-conjunt
//    / all-conjunts exports) --
function buildPdfFromPages(pages){
  return pdfLibReady.then(function(){
    // load a copy — repeated exports (one PDF per conjunt) must not consume the
    // original bytes
    return Promise.all([PDFLib.PDFDocument.load(state.pdfBytes.slice()), PDFLib.PDFDocument.create()]);
  }).then(function(docs){
    var srcDoc = docs[0], newDoc = docs[1];
    var n = srcDoc.getPageCount();
    // Keep only real, in-range page indices — a bad/NaN or out-of-range page
    // (e.g. an imported catalog whose pages don't match the loaded PDF) would
    // otherwise crash copyPages with "reading 'node'".
    var seen = {}, indices = [];
    pages.forEach(function(p){
      var i = (parseInt(p, 10) || 0) - 1;
      if(i >= 0 && i < n && !seen[i]){ seen[i] = 1; indices.push(i); }
    });
    if(!indices.length) throw new Error('cap pàgina vàlida per exportar (revisa que les pàgines siguin dins del PDF carregat)');
    var dropped = pages.length - indices.length;
    return newDoc.copyPages(srcDoc, indices).then(function(copiedPages){
      copiedPages.forEach(function(pg){ newDoc.addPage(pg); });
      return newDoc.save();
    }).then(function(bytes){ return {bytes: bytes, count: indices.length, dropped: dropped}; });
  });
}
function dlBytes(bytes, filename, mime){
  var blob = new Blob([bytes], {type: mime || 'application/pdf'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
}
function exportConjuntPdf(c, idx){
  var pages = conjuntPages(c);
  if(!pages.length) return Promise.reject(new Error('aquest conjunt no té cap pàgina assignada'));
  return buildPdfFromPages(pages).then(function(res){
    dlBytes(res.bytes, conjuntPdfFileName(c, idx));
    return res.count;
  });
}

  var pages = allConjuntsPages();
  if(!pages.length){ showToast('Els conjunts no tenen cap pàgina assignada.'); return; }
  var btn = els.exportCombinedPdfBtn, lbl = btn.textContent;
  btn.disabled = true; btn.textContent = 'Generant PDF…';
  buildPdfFromPages(pages).then(function(res){
    var fn = combinedPdfFileName();
    dlBytes(res.bytes, fn);
    showToast('PDF generat: ' + fn + ' (' + res.count + ' pàgines' + (res.dropped ? ', ' + res.dropped + ' fora de rang omeses' : '') + ').', res.dropped ? 4000 : 2500);
  }).catch(function(err){
    showToast('Error generant el PDF: ' + err.message, 4000);
  }).then(function(){ btn.disabled = false; btn.textContent = lbl; });
});
els.exportCatalogPdfBtn.addEventListener('click', function(){
  if(!state.conjunts.length){ showToast('No hi ha cap conjunt creat.'); return; }
  var btn = els.exportCatalogPdfBtn, lbl = btn.textContent;
  btn.disabled = true; btn.textContent = 'Generant PDFs…';
  // sequential (each one re-parses the source PDF) + a small gap so the browser
  // doesn't drop rapid downloads
  var chain = Promise.resolve(), done = 0, failed = 0;
  state.conjunts.forEach(function(c, i){
    chain = chain.then(function(){
      btn.textContent = 'Generant PDFs… (' + (i+1) + '/' + state.conjunts.length + ')';
      return exportConjuntPdf(c, i).then(function(){ done++; }).catch(function(){ failed++; });
    }).then(function(){ return new Promise(function(r){ setTimeout(r, 400); }); });
  });
  chain.then(function(){
    showToast(done + (done===1?' PDF exportat.':' PDFs exportats.') + (failed?(' ' + failed + ' sense pàgines.'):''), 4000);
    btn.disabled = false; btn.textContent = lbl;
  });
});

// -- Import a JSON (per-conjunt export, or older whole-catalog shapes) into
//    the current catalog. Needs a PDF open (that's what the panels hang off);
//    the conjunt data loads regardless, page previews just need the matching
//    manual. --
function importCatalogJson(data){
  var list = data && data.conjunt ? [data.conjunt]
    : (data && Array.isArray(data.conjunts) ? data.conjunts
    : (Array.isArray(data) ? data : null));
  if(!list){ showToast('El JSON no sembla un catàleg vàlid.'); return; }
  normalizeConjunts(list); // migrate legacy flat-rows shape; ensure subgrups + num
  list.forEach(function(c){
    c.id = uid(); // fresh ids so an import never collides with existing state
    (c.grups||[]).forEach(function(g){ g.id = uid(); (g.subgrups||[]).forEach(function(sg){ sg.id = uid(); }); });
    state.conjunts.push(c);
  });
  if(data && data.machine){
    ['serial','model','client'].forEach(function(k){ if(!state.machine[k] && data.machine[k]) state.machine[k] = data.machine[k]; });
  }
  if(!state.portadaPage && data && data.portadaPage) state.portadaPage = data.portadaPage;
  persistConjunts();
  renderMachinePanel();
  renderConjuntsPanel();
  showToast(list.length + (list.length===1 ? ' conjunt importat.' : ' conjunts importats.'));
}
els.importJsonBtn.addEventListener('click', function(){ els.importJsonInput.click(); });
els.importJsonInput.addEventListener('change', function(e){
  var file = e.target.files && e.target.files[0];
  els.importJsonInput.value = '';
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    var data;
    try{ data = JSON.parse(ev.target.result); }
    catch(err){ showToast('El fitxer no és un JSON vàlid.'); return; }
    importCatalogJson(data);
  };
  reader.onerror = function(){ showToast('No s\'ha pogut llegir el fitxer.'); };
  reader.readAsText(file);
});

// ---- Export ----
els.exportBtn.addEventListener('click', function(){
  if(state.selected.size === 0) return;
  els.exportBtn.disabled = true;
  var originalLabel = els.exportBtn.textContent;
  els.exportBtn.textContent = 'Generant PDF…';
  var pagesSorted = Array.from(state.selected).sort(function(a,b){return a-b;});
  buildPdfFromPages(pagesSorted).then(function(res){
    dlBytes(res.bytes, state.fileName + '_recanvis.pdf');
    showToast('PDF generat: ' + res.count + ' pàgines.');
  }).catch(function(err){
    console.error(err);
    showToast('Error generant el PDF: ' + err.message, 4000);
  }).then(function(){
    els.exportBtn.disabled = state.selected.size === 0;
    els.exportBtn.textContent = originalLabel;
  });
});
</script>
