<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Separador de fulles de recanvis</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1e222c; --border:#2a2f3a;
    --text:#e8eaed; --muted:#9aa3b2; --accent:#4f8cff; --accent2:#2f6fe0;
    --ok:#2ecc71; --danger:#e74c3c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:var(--bg); color:var(--text); min-height:100vh;
  }
  header{
    position:sticky; top:0; z-index:20; background:var(--panel);
    border-bottom:1px solid var(--border); padding:12px 16px;
    display:flex; flex-wrap:wrap; gap:10px; align-items:center;
  }
  header h1{font-size:16px; margin:0 12px 0 0; white-space:nowrap; font-weight:600;}
  .spacer{flex:1;}
  button{
    background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:6px; padding:8px 12px; font-size:13px; cursor:pointer;
  }
  button:hover:not(:disabled){border-color:var(--accent);}
  button:disabled{opacity:.4; cursor:not-allowed;}
  button.primary{background:var(--accent2); border-color:var(--accent2); color:#fff; font-weight:600;}
  button.primary:hover:not(:disabled){background:var(--accent);}
  input[type=text]{
    background:var(--panel2); color:var(--text); border:1px solid var(--border);
    border-radius:6px; padding:8px 10px; font-size:13px; width:180px;
  }
  #dropzone{
    margin:40px auto; max-width:560px; border:2px dashed var(--border);
    border-radius:12px; padding:48px 24px; text-align:center; color:var(--muted);
  }
  #dropzone.drag{border-color:var(--accent); color:var(--text);}
  #dropzone input[type=file]{display:none;}
  #dropzone .browse{color:var(--accent); text-decoration:underline; cursor:pointer;}
  #fileInfo{font-size:13px; color:var(--muted); white-space:nowrap;}
  #status{font-size:13px; color:var(--muted); padding:0 16px;}
  #grid{
    display:grid; grid-template-columns:repeat(auto-fill, minmax(140px,1fr));
    gap:14px; padding:16px;
  }
  .cell{
    background:var(--panel); border:2px solid var(--border); border-radius:8px;
    cursor:pointer; position:relative; overflow:hidden; user-select:none;
    transition:border-color .1s;
  }
  .cell.selected{border-color:var(--accent);}
  .thumbWrap{
    background:#0a0b0e; display:flex; align-items:center; justify-content:center;
    min-height:120px;
  }
  .cell canvas{display:block; width:100%; height:auto;}
  .cellFooter{
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 8px; font-size:12px; color:var(--muted);
  }
  .pageNum{font-weight:600; color:var(--text);}
  .check{
    width:16px; height:16px; border-radius:4px; border:1.5px solid var(--border);
    background:var(--panel2); display:flex; align-items:center; justify-content:center;
  }
  .cell.selected .check{background:var(--accent); border-color:var(--accent);}
  .check::after{content:""; width:8px; height:5px; border-left:2px solid #fff; border-bottom:2px solid #fff; transform:rotate(-45deg) translateY(-1px); display:none;}
  .cell.selected .check::after{display:block;}
  .zoomBtn{
    position:absolute; top:6px; right:6px; width:26px; height:26px; border-radius:6px;
    background:rgba(0,0,0,.55); border:1px solid rgba(255,255,255,.2); color:#fff;
    display:flex; align-items:center; justify-content:center; font-size:13px; opacity:0;
    transition:opacity .1s;
  }
  .cell:hover .zoomBtn{opacity:1;}
  #modalOverlay{
    position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:100;
    display:none; align-items:center; justify-content:center; flex-direction:column;
  }
  #modalOverlay.open{display:flex;}
  #modalTop{display:flex; align-items:center; gap:16px; color:var(--text); margin-bottom:10px;}
  #modalImgWrap{max-width:92vw; max-height:78vh; overflow:auto; background:#0a0b0e; border-radius:8px;}
  #modalImgWrap canvas{display:block; max-width:none;}
  #modalOverlay button{padding:8px 14px;}
  .placeholder{color:var(--muted); font-size:24px;}
  #emptyState{display:none; text-align:center; color:var(--muted); padding:60px 20px;}
  footer{
    position:sticky; bottom:0; background:var(--panel); border-top:1px solid var(--border);
    padding:10px 16px; display:none; align-items:center; gap:12px; flex-wrap:wrap;
  }
  #selCount{font-size:13px; color:var(--text);}
  #toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--panel2); border:1px solid var(--border); padding:10px 16px;
    border-radius:8px; font-size:13px; z-index:200; display:none;
  }

  /* ---- Groups ---- */
  #groupsPanel{
    display:none; border-bottom:1px solid var(--border); padding:12px 16px;
    background:var(--panel);
  }
  #groupsPanelHeader{
    display:flex; align-items:center; gap:12px; margin-bottom:10px;
  }
  #groupsPanelHeader strong{font-size:13px;}
  #groupsList{display:flex; flex-wrap:wrap; gap:10px;}
  .groupChip{
    background:var(--panel2); border:1px solid var(--border); border-radius:8px;
    padding:8px 10px; cursor:pointer; position:relative; min-width:150px;
    max-width:220px;
  }
  .groupChip:hover{border-color:var(--accent);}
  .groupChip .gName{font-size:13px; font-weight:600; margin-right:16px; word-break:break-word;}
  .groupChip .gMeta{font-size:11px; color:var(--muted); margin-top:4px;}
  .groupChip .gDel{
    position:absolute; top:6px; right:6px; width:18px; height:18px; line-height:16px;
    text-align:center; border-radius:4px; background:transparent; color:var(--muted);
    font-size:12px; border:1px solid transparent;
  }
  .groupChip .gDel:hover{border-color:var(--danger); color:var(--danger);}

  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.85); z-index:100;
    display:none; align-items:center; justify-content:center; flex-direction:column;
  }
  .overlay.open{display:flex;}
  .overlay button{padding:8px 14px;}

  #nameModalCard, .reviewCard{
    background:var(--panel); border:1px solid var(--border); border-radius:10px;
    padding:20px; max-width:92vw;
  }
  #nameModalCard label{display:block; font-size:13px; color:var(--muted); margin-bottom:8px;}
  #nameModalCard input[type=text]{width:280px; margin-bottom:14px;}
  #nameModalCard .actions{display:flex; justify-content:flex-end; gap:8px;}

  .reviewCard{width:min(900px,92vw); max-height:88vh; overflow:auto;}
  .reviewTop{display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap;}
  .reviewTop input[type=text]{width:260px;}
  .reviewThumbs{display:flex; gap:8px; overflow-x:auto; margin-bottom:16px; padding-bottom:4px;}
  .reviewThumbs canvas{height:140px; width:auto; border:1px solid var(--border); border-radius:6px; flex-shrink:0;}
  table.rowsTable{width:100%; border-collapse:collapse; margin-bottom:12px;}
  table.rowsTable th{text-align:left; font-size:11px; color:var(--muted); padding:4px 6px; border-bottom:1px solid var(--border);}
  table.rowsTable td{padding:4px 6px; border-bottom:1px solid var(--border);}
  table.rowsTable input[type=text]{width:100%; padding:6px 8px;}
  table.rowsTable td.posCol input{width:60px;}
  table.rowsTable td.cantCol input{width:60px;}
  table.rowsTable td.refCol input{width:120px;}
  table.rowsTable td.rmCol{width:30px;}
  .rmRowBtn{width:26px; height:26px; padding:0; color:var(--danger); border-color:var(--border);}
  .reviewActions{display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap;}
  .reviewActions .left{display:flex; gap:8px;}
  .reviewActions .right{display:flex; gap:8px;}

  #groupDetailCard{width:min(640px,92vw);}
  #conjuntsList{margin-bottom:12px;}
  .conjuntRow{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--panel2); border:1px solid var(--border); border-radius:8px;
    padding:10px 12px; margin-bottom:8px; cursor:pointer;
  }
  .conjuntRow:hover{border-color:var(--accent);}
  .conjuntRow .cInfo{display:flex; flex-direction:column; gap:2px;}
  .conjuntRow .cName{font-size:13px; font-weight:600;}
  .conjuntRow .cMeta{font-size:11px; color:var(--muted);}
  .conjuntRow .cDel{color:var(--danger); flex-shrink:0;}
  #groupDetailEmpty{color:var(--muted); font-size:13px; padding:4px 0 12px;}
  #addConjuntBtn{margin-bottom:4px;}
</style>
</head>
<body>

<header id="mainHeader" style="display:none;">
  <h1>Separador de fulles de recanvis</h1>
  <div id="fileInfo"></div>
  <div class="spacer"></div>
  <input type="text" id="rangeInput" placeholder="ex: 81-194, 341">
  <button id="addRangeBtn">Afegeix pàgines</button>
  <button id="selectAllBtn">Selecciona-ho tot</button>
  <button id="clearSelBtn">Neteja selecció</button>
  <button id="createGroupBtn">Crea un grup</button>
  <button id="newFileBtn">Obre un altre PDF</button>
</header>

<div id="groupsPanel">
  <div id="groupsPanelHeader">
    <strong>Grups de dibuix</strong>
    <button id="exportCatalogBtn">Exporta catàleg (JSON)</button>
  </div>
  <div id="groupsList"></div>
</div>

<div id="status"></div>

<div id="dropzone">
  <p>Arrossega aquí el manual PDF<br>o</p>
  <label class="browse">tria un fitxer<input type="file" id="fileInput" accept="application/pdf"></label>
</div>

<div id="emptyState"></div>
<div id="grid"></div>

<footer id="footerBar">
  <span id="selCount">0 pàgines seleccionades</span>
  <div class="spacer"></div>
  <button class="primary" id="exportBtn" disabled>Genera PDF de recanvis</button>
</footer>

<div id="modalOverlay">
  <div id="modalTop">
    <button id="modalPrev">◀ Anterior</button>
    <span id="modalPageLabel"></span>
    <button id="modalNext">Següent ▶</button>
    <button id="modalToggle">Selecciona aquesta pàgina</button>
    <button id="modalClose">Tanca ✕</button>
  </div>
  <div id="modalImgWrap"><canvas id="modalCanvas"></canvas></div>
</div>

<div class="overlay" id="nameModalOverlay">
  <div id="nameModalCard">
    <label for="groupNameInput" id="nameModalLabel">Nom del grup</label>
    <input type="text" id="groupNameInput" placeholder="ex: Zócalo (ZO) — bastidor">
    <div class="actions">
      <button id="nameModalCancel">Cancel·la</button>
      <button class="primary" id="nameModalCreate">Crea</button>
    </div>
  </div>
</div>

<div class="overlay" id="groupDetailOverlay">
  <div class="reviewCard" id="groupDetailCard">
    <div class="reviewTop">
      <input type="text" id="groupDetailNameInput">
      <button id="groupDetailCloseBtn">Tanca ✕</button>
    </div>
    <div id="conjuntsList"></div>
    <div id="groupDetailEmpty" style="display:none;">Aquest grup encara no té cap conjunt.</div>
    <button id="addConjuntBtn">+ Afegeix un conjunt amb la selecció actual</button>
    <div class="reviewActions" style="margin-top:16px;">
      <div class="left">
        <button id="deleteGroupDetailBtn">Elimina el grup</button>
      </div>
      <div class="right"></div>
    </div>
  </div>
</div>

<div class="overlay" id="groupModalOverlay">
  <div class="reviewCard">
    <div class="reviewTop">
      <input type="text" id="reviewNameInput">
      <span id="reviewPagesLabel" style="color:var(--muted); font-size:12px;"></span>
    </div>
    <div class="reviewThumbs" id="reviewThumbs"></div>
    <table class="rowsTable" id="reviewTable">
      <thead>
        <tr>
          <th class="posCol">Pos.</th>
          <th class="refCol">Ref.</th>
          <th class="cantCol">Cant.</th>
          <th>Denominació</th>
          <th class="rmCol"></th>
        </tr>
      </thead>
      <tbody id="reviewTableBody"></tbody>
    </table>
    <button id="addRowBtn">+ Afegeix fila</button>
    <div class="reviewActions" style="margin-top:16px;">
      <div class="left">
        <button id="deleteConjuntBtn">Elimina el conjunt</button>
      </div>
      <div class="right">
        <button id="reviewCancelBtn">Cancel·la</button>
        <button class="primary" id="reviewSaveBtn">Desa el conjunt</button>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
function loadScript(urls){
  return new Promise((resolve, reject)=>{
    var i=0;
    function tryNext(){
      if(i>=urls.length){reject(new Error("No s'ha pogut carregar cap script"));return;}
      var s=document.createElement('script');
      s.src=urls[i];
      s.onload=resolve;
      s.onerror=function(){ i++; tryNext(); };
      document.head.appendChild(s);
    }
    tryNext();
  });
}

var pdfjsReady = loadScript([
  'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js'
]).then(function(){
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
});

var pdfLibReady = loadScript([
  'https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js',
  'https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js'
]);

var els = {
  header: document.getElementById('mainHeader'),
  fileInfo: document.getElementById('fileInfo'),
  status: document.getElementById('status'),
  dropzone: document.getElementById('dropzone'),
  fileInput: document.getElementById('fileInput'),
  grid: document.getElementById('grid'),
  footer: document.getElementById('footerBar'),
  selCount: document.getElementById('selCount'),
  exportBtn: document.getElementById('exportBtn'),
  rangeInput: document.getElementById('rangeInput'),
  addRangeBtn: document.getElementById('addRangeBtn'),
  selectAllBtn: document.getElementById('selectAllBtn'),
  clearSelBtn: document.getElementById('clearSelBtn'),
  newFileBtn: document.getElementById('newFileBtn'),
  modalOverlay: document.getElementById('modalOverlay'),
  modalCanvas: document.getElementById('modalCanvas'),
  modalPageLabel: document.getElementById('modalPageLabel'),
  modalPrev: document.getElementById('modalPrev'),
  modalNext: document.getElementById('modalNext'),
  modalToggle: document.getElementById('modalToggle'),
  modalClose: document.getElementById('modalClose'),
  toast: document.getElementById('toast'),
  createGroupBtn: document.getElementById('createGroupBtn'),
  groupsPanel: document.getElementById('groupsPanel'),
  groupsList: document.getElementById('groupsList'),
  exportCatalogBtn: document.getElementById('exportCatalogBtn'),
  nameModalOverlay: document.getElementById('nameModalOverlay'),
  nameModalLabel: document.getElementById('nameModalLabel'),
  groupNameInput: document.getElementById('groupNameInput'),
  nameModalCancel: document.getElementById('nameModalCancel'),
  nameModalCreate: document.getElementById('nameModalCreate'),
  groupDetailOverlay: document.getElementById('groupDetailOverlay'),
  groupDetailNameInput: document.getElementById('groupDetailNameInput'),
  groupDetailCloseBtn: document.getElementById('groupDetailCloseBtn'),
  conjuntsList: document.getElementById('conjuntsList'),
  groupDetailEmpty: document.getElementById('groupDetailEmpty'),
  addConjuntBtn: document.getElementById('addConjuntBtn'),
  deleteGroupDetailBtn: document.getElementById('deleteGroupDetailBtn'),
  groupModalOverlay: document.getElementById('groupModalOverlay'),
  reviewNameInput: document.getElementById('reviewNameInput'),
  reviewPagesLabel: document.getElementById('reviewPagesLabel'),
  reviewThumbs: document.getElementById('reviewThumbs'),
  reviewTableBody: document.getElementById('reviewTableBody'),
  addRowBtn: document.getElementById('addRowBtn'),
  deleteConjuntBtn: document.getElementById('deleteConjuntBtn'),
  reviewCancelBtn: document.getElementById('reviewCancelBtn'),
  reviewSaveBtn: document.getElementById('reviewSaveBtn')
};

var state = {
  pdfDoc: null,
  pdfBytes: null,
  fileName: '',
  numPages: 0,
  selected: new Set(),
  cells: [],
  modalPage: 1,
  renderQueue: [],
  activeRenders: 0,
  groups: [],
  currentGroupId: null,
  editingConjunt: null
};

function showToast(msg, ms){
  els.toast.textContent = msg;
  els.toast.style.display = 'block';
  clearTimeout(showToast._t);
  showToast._t = setTimeout(function(){ els.toast.style.display='none'; }, ms||2500);
}

function setStatus(msg){ els.status.textContent = msg || ''; }

// ---- File loading ----
['dragover','dragenter'].forEach(function(ev){
  els.dropzone.addEventListener(ev, function(e){ e.preventDefault(); els.dropzone.classList.add('drag'); });
});
['dragleave','drop'].forEach(function(ev){
  els.dropzone.addEventListener(ev, function(e){ e.preventDefault(); els.dropzone.classList.remove('drag'); });
});
els.dropzone.addEventListener('drop', function(e){
  var f = e.dataTransfer.files && e.dataTransfer.files[0];
  if(f) handleFile(f);
});
els.fileInput.addEventListener('change', function(e){
  var f = e.target.files[0];
  if(f) handleFile(f);
});
els.newFileBtn.addEventListener('click', function(){
  resetApp();
});

function resetApp(){
  state.pdfDoc = null; state.pdfBytes = null; state.numPages = 0;
  state.selected = new Set(); state.cells = [];
  state.groups = []; state.editingConjunt = null; state.currentGroupId = null;
  els.grid.innerHTML = '';
  els.header.style.display = 'none';
  els.footer.style.display = 'none';
  els.groupsPanel.style.display = 'none';
  els.groupsList.innerHTML = '';
  els.dropzone.style.display = 'block';
  els.fileInput.value = '';
  setStatus('');
}

function handleFile(file){
  if(file.type !== 'application/pdf' && !/\.pdf$/i.test(file.name)){
    showToast('El fitxer ha de ser un PDF.');
    return;
  }
  els.dropzone.style.display = 'none';
  setStatus('Carregant "' + file.name + '"…');
  state.fileName = file.name.replace(/\.pdf$/i,'');
  var reader = new FileReader();
  reader.onload = function(e){
    state.pdfBytes = new Uint8Array(e.target.result);
    loadPdf(state.pdfBytes.slice());
  };
  reader.onerror = function(){ setStatus(''); showToast('Error llegint el fitxer.'); els.dropzone.style.display='block'; };
  reader.readAsArrayBuffer(file);
}

function loadPdf(bytesForPdfjs){
  pdfjsReady.then(function(){
    return pdfjsLib.getDocument({ data: bytesForPdfjs }).promise;
  }).then(function(doc){
    state.pdfDoc = doc;
    state.numPages = doc.numPages;
    buildGrid();
    els.header.style.display = 'flex';
    els.footer.style.display = 'flex';
    els.fileInfo.textContent = state.fileName + '.pdf — ' + state.numPages + ' pàgines';
    setStatus('');
    updateSelCount();
    state.groups = loadGroupsForFile(state.fileName);
    renderGroupsPanel();
  }).catch(function(err){
    console.error(err);
    setStatus('');
    showToast('No s\'ha pogut obrir el PDF: ' + err.message);
    els.dropzone.style.display = 'block';
  });
}

// ---- Grid / thumbnails ----
function buildGrid(){
  els.grid.innerHTML = '';
  state.cells = [];
  var frag = document.createDocumentFragment();
  for(var p=1; p<=state.numPages; p++){
    var cell = document.createElement('div');
    cell.className = 'cell';
    cell.dataset.page = p;

    var thumbWrap = document.createElement('div');
    thumbWrap.className = 'thumbWrap';
    var canvas = document.createElement('canvas');
    thumbWrap.appendChild(canvas);
    cell.appendChild(thumbWrap);

    var zoomBtn = document.createElement('div');
    zoomBtn.className = 'zoomBtn';
    zoomBtn.textContent = '🔍';
    zoomBtn.addEventListener('click', function(e){
      e.stopPropagation();
      openModal(parseInt(e.currentTarget.parentElement.dataset.page,10));
    });
    cell.appendChild(zoomBtn);

    var footerRow = document.createElement('div');
    footerRow.className = 'cellFooter';
    var pageNum = document.createElement('span');
    pageNum.className = 'pageNum';
    pageNum.textContent = p;
    var check = document.createElement('span');
    check.className = 'check';
    footerRow.appendChild(pageNum);
    footerRow.appendChild(check);
    cell.appendChild(footerRow);

    cell.addEventListener('click', function(e){
      toggleSelect(parseInt(e.currentTarget.dataset.page,10));
    });

    frag.appendChild(cell);
    state.cells.push({el: cell, canvas: canvas, rendered:false, page:p});
  }
  els.grid.appendChild(frag);
  setupLazyRender();
}

var io;
function setupLazyRender(){
  if(io) io.disconnect();
  io = new IntersectionObserver(function(entries){
    entries.forEach(function(entry){
      if(entry.isIntersecting){
        var page = parseInt(entry.target.dataset.page,10);
        queueRender(page);
        io.unobserve(entry.target);
      }
    });
  }, {root:null, rootMargin:'400px 0px', threshold:0.01});
  state.cells.forEach(function(c){ io.observe(c.el); });
}

function queueRender(page){
  state.renderQueue.push(page);
  pumpRenderQueue();
}
function pumpRenderQueue(){
  while(state.activeRenders < 4 && state.renderQueue.length){
    var page = state.renderQueue.shift();
    renderThumb(page);
  }
}
function renderThumb(page){
  var cellInfo = state.cells[page-1];
  if(!cellInfo || cellInfo.rendered) return;
  cellInfo.rendered = true;
  state.activeRenders++;
  renderPageToCanvas(page, cellInfo.canvas, 220).catch(function(err){
    console.warn('Error rendering page', page, err);
  }).then(function(){
    state.activeRenders--;
    pumpRenderQueue();
  });
}

function renderPageToCanvas(page, canvas, targetWidth){
  return state.pdfDoc.getPage(page).then(function(pdfPage){
    var vp0 = pdfPage.getViewport({scale:1});
    var scale = targetWidth / vp0.width;
    var viewport = pdfPage.getViewport({scale: scale});
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    var ctx = canvas.getContext('2d');
    return pdfPage.render({canvasContext: ctx, viewport: viewport}).promise;
  });
}

function toggleSelect(page){
  var cellInfo = state.cells[page-1];
  if(state.selected.has(page)){
    state.selected.delete(page);
    cellInfo.el.classList.remove('selected');
  } else {
    state.selected.add(page);
    cellInfo.el.classList.add('selected');
  }
  updateSelCount();
  if(els.modalOverlay.classList.contains('open') && state.modalPage === page){
    updateModalToggleLabel();
  }
}

function updateSelCount(){
  var n = state.selected.size;
  els.selCount.textContent = n + (n===1 ? ' pàgina seleccionada' : ' pàgines seleccionades');
  els.exportBtn.disabled = n === 0;
}

// ---- Toolbar actions ----
els.selectAllBtn.addEventListener('click', function(){
  for(var p=1;p<=state.numPages;p++){
    state.selected.add(p);
    state.cells[p-1].el.classList.add('selected');
  }
  updateSelCount();
});
els.clearSelBtn.addEventListener('click', function(){
  state.selected.forEach(function(p){ state.cells[p-1].el.classList.remove('selected'); });
  state.selected.clear();
  updateSelCount();
});
els.addRangeBtn.addEventListener('click', applyRangeInput);
els.rangeInput.addEventListener('keydown', function(e){
  if(e.key === 'Enter') applyRangeInput();
});
function applyRangeInput(){
  var raw = els.rangeInput.value.trim();
  if(!raw) return;
  var parts = raw.split(',');
  var added = 0;
  parts.forEach(function(part){
    part = part.trim();
    if(!part) return;
    var m = part.match(/^(\d+)\s*-\s*(\d+)$/);
    if(m){
      var a = parseInt(m[1],10), b = parseInt(m[2],10);
      if(a>b){ var t=a; a=b; b=t; }
      for(var p=a; p<=b; p++){
        if(p>=1 && p<=state.numPages && !state.selected.has(p)){
          state.selected.add(p);
          state.cells[p-1].el.classList.add('selected');
          added++;
        }
      }
    } else if(/^\d+$/.test(part)){
      var n = parseInt(part,10);
      if(n>=1 && n<=state.numPages && !state.selected.has(n)){
        state.selected.add(n);
        state.cells[n-1].el.classList.add('selected');
        added++;
      }
    }
  });
  updateSelCount();
  els.rangeInput.value = '';
  if(added){
    var first = Math.min.apply(null, Array.from(state.selected));
    var target = state.cells[first-1];
    if(target) target.el.scrollIntoView({behavior:'smooth', block:'center'});
  }
}

// ---- Modal preview ----
function openModal(page){
  state.modalPage = page;
  els.modalOverlay.classList.add('open');
  renderModalPage(page);
}
function renderModalPage(page){
  els.modalPageLabel.textContent = 'Pàgina ' + page + ' de ' + state.numPages;
  updateModalToggleLabel();
  state.pdfDoc.getPage(page).then(function(pdfPage){
    var vp0 = pdfPage.getViewport({scale:1});
    var maxWidth = Math.min(window.innerWidth*0.9, 1100);
    var scale = maxWidth / vp0.width;
    var viewport = pdfPage.getViewport({scale: scale});
    els.modalCanvas.width = viewport.width;
    els.modalCanvas.height = viewport.height;
    var ctx = els.modalCanvas.getContext('2d');
    return pdfPage.render({canvasContext: ctx, viewport: viewport}).promise;
  });
}
function updateModalToggleLabel(){
  els.modalToggle.textContent = state.selected.has(state.modalPage)
    ? '✓ Pàgina seleccionada (treu-la)'
    : 'Selecciona aquesta pàgina';
}
els.modalPrev.addEventListener('click', function(){
  if(state.modalPage > 1){ state.modalPage--; renderModalPage(state.modalPage); }
});
els.modalNext.addEventListener('click', function(){
  if(state.modalPage < state.numPages){ state.modalPage++; renderModalPage(state.modalPage); }
});
els.modalToggle.addEventListener('click', function(){
  toggleSelect(state.modalPage);
  updateModalToggleLabel();
});
els.modalClose.addEventListener('click', closeModal);
els.modalOverlay.addEventListener('click', function(e){
  if(e.target === els.modalOverlay) closeModal();
});
document.addEventListener('keydown', function(e){
  if(!els.modalOverlay.classList.contains('open')) return;
  if(e.key === 'Escape') closeModal();
  if(e.key === 'ArrowLeft') els.modalPrev.click();
  if(e.key === 'ArrowRight') els.modalNext.click();
  if(e.key === ' '){ e.preventDefault(); els.modalToggle.click(); }
});
function closeModal(){
  els.modalOverlay.classList.remove('open');
}

// ---- Groups (spare-parts catalog) ----
// Data model: a Group is a named container ("Fusor Micron", "Zócalo") holding
// several Conjunts ("A. Conjunto Depósito", "B. Conjunto Distribuidor"...),
// each tied to its own drawing page(s) and its own editable rows table.
var GROUPS_LS_KEY = 'rs_groups_v2';

function loadAllGroups(){
  try{ return JSON.parse(localStorage.getItem(GROUPS_LS_KEY) || '{}'); }
  catch(e){ return {}; }
}
function loadGroupsForFile(fileName){
  return loadAllGroups()[fileName] || [];
}
function persistGroups(){
  var all = loadAllGroups();
  all[state.fileName] = state.groups;
  localStorage.setItem(GROUPS_LS_KEY, JSON.stringify(all));
}
function uid(){
  return Date.now().toString(36) + Math.random().toString(36).slice(2,8);
}

// -- Page text helper: reconstructs reading-order lines from pdf.js text
//    items, grouping by Y coordinate. Shared by row extraction and name
//    suggestion so both see the same line reconstruction. --
function getPageLines(page){
  return state.pdfDoc.getPage(page).then(function(pdfPage){
    return pdfPage.getTextContent();
  }).then(function(tc){
    var lines = [];
    tc.items.forEach(function(it){
      var str = it.str;
      if(!str || !str.trim()) return;
      var x = it.transform[4], y = it.transform[5];
      var line = null;
      for(var i=0;i<lines.length;i++){
        if(Math.abs(lines[i].y - y) < 3){ line = lines[i]; break; }
      }
      if(!line){ line = {y:y, items:[]}; lines.push(line); }
      line.items.push({x:x, str:str});
    });
    lines.sort(function(a,b){ return b.y - a.y; }); // top-to-bottom (PDF space: y grows upward)
    return lines.map(function(l){
      l.items.sort(function(a,b){ return a.x - b.x; });
      return l.items.map(function(it){ return it.str; }).join(' ').replace(/\s+/g,' ').trim();
    }).filter(Boolean);
  });
}

// -- Text extraction heuristic (deliberately simple; the review table is what
//    guarantees quality, since column layouts vary between manual sections) --
function extractRowsFromPage(page){
  return getPageLines(page).then(function(lines){
    return lines.map(function(text){ return parseLineToRow(text, page); });
  });
}

// -- Suggest a name from the drawing's own title text: sections copied from
//    the Meler/Micron sub-manuals have a heading like "A. CONJUNTO DEPÓSITO";
//    the main machine's drawing sheets have a "GRUPO <name>" / "SUBGRUPO
//    <name>" label in the title block instead. Only looks at the first page
//    of the selection — always editable before confirming. --
function suggestNameFromPages(pages){
  if(!pages.length) return Promise.resolve('');
  return getPageLines(pages[0]).then(function(lines){
    for(var i=0;i<lines.length;i++){
      if(/^[A-Z]\.?\s*CONJUNTO\s+.+/i.test(lines[i])) return titleCaseEs(lines[i]);
    }
    for(var i=0;i<lines.length;i++){
      var m = lines[i].match(/\bGRUPO\s+(.+)$/i);
      if(m) return m[1].trim();
    }
    for(var i=0;i<lines.length;i++){
      var m = lines[i].match(/\bSUBGRUPO\s+(.+)$/i);
      if(m) return m[1].trim();
    }
    return '';
  }).catch(function(){ return ''; });
}
function titleCaseEs(s){
  return s.trim().toLowerCase().replace(/(^|\s)([a-záéíóúñ])/g, function(m,sp,c){ return sp + c.toUpperCase(); });
}

function parseLineToRow(text, page){
  var tokens = text.split(' ');
  var pos = '', ref = '', cant = '', denomParts = [];
  var posSet = false, cantSet = false;
  tokens.forEach(function(tok){
    if(!posSet && /^\d+(\.\d+)?$/.test(tok)){ pos = tok; posSet = true; return; }
    if(!ref && /^\d{6,}$/.test(tok)){ ref = tok; return; }
    if(posSet && !cantSet && /^\d+$/.test(tok) && tok.length < 6){ cant = tok; cantSet = true; return; }
    denomParts.push(tok);
  });
  // Fallback: some sections encode the part code as a trailing alphanumeric
  // token with dashes (e.g. "ZO-200-95", "4726-01-01") instead of a plain
  // 6+ digit number — pull it out of the denomination if nothing matched yet.
  if(!ref && denomParts.length){
    var last = denomParts[denomParts.length-1];
    if(/^[A-Za-z0-9]+-[A-Za-z0-9-]+$/.test(last) && /\d/.test(last)){
      ref = last;
      denomParts = denomParts.slice(0, -1);
    }
  }
  return {pos:pos, ref:ref, cant:cant, denominacio:denomParts.join(' '), page:page};
}

// -- Name modal: shared by "create a Group" and "add a Conjunt to a Group" --
var pendingNameAction = null; // 'group' | 'conjunt'
var pendingGroupId = null;
var pendingPages = null;

els.createGroupBtn.addEventListener('click', function(){
  pendingNameAction = 'group';
  pendingGroupId = null;
  pendingPages = null;
  els.nameModalLabel.textContent = 'Nom del grup';
  els.groupNameInput.value = '';
  els.nameModalOverlay.classList.add('open');
  els.groupNameInput.focus();
  var pages = Array.from(state.selected).sort(function(a,b){ return a-b; });
  if(pages.length){
    suggestNameFromPages(pages).then(function(name){
      if(name && pendingNameAction === 'group'){
        els.groupNameInput.value = name;
        els.groupNameInput.select();
      }
    });
  }
});
els.nameModalCancel.addEventListener('click', cancelNameModal);
els.nameModalOverlay.addEventListener('click', function(e){
  if(e.target === els.nameModalOverlay) cancelNameModal();
});
function closeNameModal(){
  els.nameModalOverlay.classList.remove('open');
  pendingNameAction = null; pendingGroupId = null; pendingPages = null;
}
function cancelNameModal(){
  var action = pendingNameAction, groupId = pendingGroupId;
  closeNameModal();
  if(action === 'conjunt' && groupId) openGroupDetail(groupId);
}
els.groupNameInput.addEventListener('keydown', function(e){
  if(e.key === 'Enter') els.nameModalCreate.click();
});
els.nameModalCreate.addEventListener('click', function(){
  var name = els.groupNameInput.value.trim();
  if(!name){ showToast('Posa un nom.'); return; }
  var action = pendingNameAction, groupId = pendingGroupId, pages = pendingPages;
  els.nameModalOverlay.classList.remove('open');
  pendingNameAction = null; pendingGroupId = null; pendingPages = null;
  if(action === 'group') createGroup(name);
  else if(action === 'conjunt') addConjuntToGroup(groupId, name, pages);
});

function createGroup(name){
  var group = {id: uid(), name: name, conjunts: []};
  state.groups.push(group);
  persistGroups();
  renderGroupsPanel();
  openGroupDetail(group.id);
}

function deleteGroup(id){
  state.groups = state.groups.filter(function(g){ return g.id !== id; });
  persistGroups();
  renderGroupsPanel();
}

// -- Groups panel --
function renderGroupsPanel(){
  els.groupsPanel.style.display = state.groups.length ? 'block' : 'none';
  els.groupsList.innerHTML = '';
  state.groups.forEach(function(g){
    var chip = document.createElement('div');
    chip.className = 'groupChip';
    var nameEl = document.createElement('div');
    nameEl.className = 'gName';
    nameEl.textContent = g.name;
    var rowCount = g.conjunts.reduce(function(sum,c){ return sum + c.rows.length; }, 0);
    var metaEl = document.createElement('div');
    metaEl.className = 'gMeta';
    metaEl.textContent = g.conjunts.length + (g.conjunts.length===1?' conjunt · ':' conjunts · ') +
      rowCount + (rowCount===1?' fila':' files');
    var delBtn = document.createElement('button');
    delBtn.className = 'gDel';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', function(e){
      e.stopPropagation();
      deleteGroup(g.id);
    });
    chip.appendChild(nameEl);
    chip.appendChild(metaEl);
    chip.appendChild(delBtn);
    chip.addEventListener('click', function(){ openGroupDetail(g.id); });
    els.groupsList.appendChild(chip);
  });
}

// -- Group detail modal: lists the group's conjunts, lets you add a new one
//    from the pages currently checked in the main grid --
function openGroupDetail(groupId){
  var g = state.groups.find(function(x){ return x.id === groupId; });
  if(!g) return;
  state.currentGroupId = groupId;
  els.groupDetailNameInput.value = g.name;
  renderConjuntsList(g);
  els.groupDetailOverlay.classList.add('open');
}
function closeGroupDetail(){
  els.groupDetailOverlay.classList.remove('open');
  state.currentGroupId = null;
}
function renderConjuntsList(g){
  els.conjuntsList.innerHTML = '';
  els.groupDetailEmpty.style.display = g.conjunts.length ? 'none' : 'block';
  var n = state.selected.size;
  els.addConjuntBtn.textContent = n
    ? '+ Afegeix un conjunt amb la selecció actual (' + n + (n===1?' pàgina)':' pàgines)')
    : '+ Afegeix un conjunt (selecciona pàgines a la graella primer)';
  els.addConjuntBtn.disabled = n === 0;
  g.conjunts.forEach(function(c){
    var row = document.createElement('div');
    row.className = 'conjuntRow';
    var info = document.createElement('div');
    info.className = 'cInfo';
    var nameEl = document.createElement('span');
    nameEl.className = 'cName';
    nameEl.textContent = c.name;
    var metaEl = document.createElement('span');
    metaEl.className = 'cMeta';
    metaEl.textContent = 'Pàg. ' + c.pages.join(', ') + ' · ' + c.rows.length + (c.rows.length===1?' fila':' files');
    info.appendChild(nameEl); info.appendChild(metaEl);
    var delBtn = document.createElement('button');
    delBtn.className = 'cDel';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', function(e){
      e.stopPropagation();
      deleteConjunt(g.id, c.id);
    });
    row.appendChild(info);
    row.appendChild(delBtn);
    row.addEventListener('click', function(){ openConjuntReview(g.id, c.id, false); });
    els.conjuntsList.appendChild(row);
  });
}
els.groupDetailCloseBtn.addEventListener('click', closeGroupDetail);
els.groupDetailOverlay.addEventListener('click', function(e){
  if(e.target === els.groupDetailOverlay) closeGroupDetail();
});
els.groupDetailNameInput.addEventListener('input', function(){
  var g = state.groups.find(function(x){ return x.id === state.currentGroupId; });
  if(g) g.name = els.groupDetailNameInput.value;
});
els.groupDetailNameInput.addEventListener('blur', function(){
  var name = els.groupDetailNameInput.value.trim();
  if(!name){ showToast('Posa un nom al grup.'); return; }
  persistGroups();
  renderGroupsPanel();
});
els.deleteGroupDetailBtn.addEventListener('click', function(){
  var groupId = state.currentGroupId;
  closeGroupDetail();
  deleteGroup(groupId);
});
els.addConjuntBtn.addEventListener('click', function(){
  if(state.selected.size === 0) return;
  pendingNameAction = 'conjunt';
  pendingGroupId = state.currentGroupId;
  pendingPages = Array.from(state.selected).sort(function(a,b){ return a-b; });
  els.groupDetailOverlay.classList.remove('open'); // avoid stacking two overlays
  els.nameModalLabel.textContent = 'Nom del conjunt';
  els.groupNameInput.value = '';
  els.nameModalOverlay.classList.add('open');
  els.groupNameInput.focus();
  suggestNameFromPages(pendingPages).then(function(name){
    if(name && pendingNameAction === 'conjunt'){
      els.groupNameInput.value = name;
      els.groupNameInput.select();
    }
  });
});

function addConjuntToGroup(groupId, name, pages){
  var g = state.groups.find(function(x){ return x.id === groupId; });
  if(!g) return;
  setStatus('Extraient text de ' + pages.length + ' pàgines…');
  Promise.all(pages.map(extractRowsFromPage)).then(function(rowsPerPage){
    var rows = [].concat.apply([], rowsPerPage);
    var conjunt = {id: uid(), name: name, pages: pages, rows: rows};
    g.conjunts.push(conjunt);
    persistGroups();
    renderGroupsPanel();
    setStatus('');
    openConjuntReview(groupId, conjunt.id, true);
  }).catch(function(err){
    console.error(err);
    setStatus('');
    showToast('Error extraient el text: ' + err.message, 4000);
  });
}

function deleteConjunt(groupId, conjuntId){
  var g = state.groups.find(function(x){ return x.id === groupId; });
  if(!g) return;
  g.conjunts = g.conjunts.filter(function(c){ return c.id !== conjuntId; });
  persistGroups();
  renderGroupsPanel();
  if(els.groupDetailOverlay.classList.contains('open') && state.currentGroupId === groupId){
    renderConjuntsList(g);
  }
}

// -- Conjunt review modal (pages + editable rows table) --
function openConjuntReview(groupId, conjuntId, isNew){
  var g = state.groups.find(function(x){ return x.id === groupId; });
  var c = g && g.conjunts.find(function(x){ return x.id === conjuntId; });
  if(!c) return;
  state.editingConjunt = {
    groupId: groupId,
    id: c.id,
    isNew: !!isNew,
    rows: c.rows.map(function(r){
      return {pos:r.pos, ref:r.ref, cant:r.cant, denominacio:r.denominacio, page:r.page};
    }),
    pages: c.pages.slice()
  };
  els.reviewNameInput.value = c.name;
  els.reviewPagesLabel.textContent = 'Pàgines: ' + c.pages.join(', ');
  els.reviewThumbs.innerHTML = '';
  c.pages.forEach(function(p){
    var cv = document.createElement('canvas');
    els.reviewThumbs.appendChild(cv);
    renderPageToCanvas(p, cv, 260).catch(function(err){ console.warn('preview render', p, err); });
  });
  renderReviewTable();
  els.groupDetailOverlay.classList.remove('open');
  els.groupModalOverlay.classList.add('open');
}

function renderReviewTable(){
  var rows = state.editingConjunt.rows;
  els.reviewTableBody.innerHTML = '';
  rows.forEach(function(row, idx){
    var tr = document.createElement('tr');

    var tdPos = document.createElement('td'); tdPos.className = 'posCol';
    var inPos = document.createElement('input'); inPos.type = 'text'; inPos.value = row.pos;
    inPos.addEventListener('input', function(){ row.pos = inPos.value; });
    tdPos.appendChild(inPos); tr.appendChild(tdPos);

    var tdRef = document.createElement('td'); tdRef.className = 'refCol';
    var inRef = document.createElement('input'); inRef.type = 'text'; inRef.value = row.ref;
    inRef.addEventListener('input', function(){ row.ref = inRef.value; });
    tdRef.appendChild(inRef); tr.appendChild(tdRef);

    var tdCant = document.createElement('td'); tdCant.className = 'cantCol';
    var inCant = document.createElement('input'); inCant.type = 'text'; inCant.value = row.cant;
    inCant.addEventListener('input', function(){ row.cant = inCant.value; });
    tdCant.appendChild(inCant); tr.appendChild(tdCant);

    var tdDen = document.createElement('td');
    var inDen = document.createElement('input'); inDen.type = 'text'; inDen.value = row.denominacio;
    inDen.addEventListener('input', function(){ row.denominacio = inDen.value; });
    tdDen.appendChild(inDen); tr.appendChild(tdDen);

    var tdRm = document.createElement('td'); tdRm.className = 'rmCol';
    var rmBtn = document.createElement('button'); rmBtn.className = 'rmRowBtn'; rmBtn.textContent = '✕';
    rmBtn.addEventListener('click', function(){
      state.editingConjunt.rows.splice(idx, 1);
      renderReviewTable();
    });
    tdRm.appendChild(rmBtn); tr.appendChild(tdRm);

    els.reviewTableBody.appendChild(tr);
  });
}

els.addRowBtn.addEventListener('click', function(){
  state.editingConjunt.rows.push({pos:'', ref:'', cant:'', denominacio:'', page: state.editingConjunt.pages[0]});
  renderReviewTable();
});

els.reviewCancelBtn.addEventListener('click', function(){
  var ec = state.editingConjunt;
  if(!ec) return;
  var wasNew = ec.isNew, groupId = ec.groupId, id = ec.id;
  closeConjuntReview();
  if(wasNew) deleteConjunt(groupId, id);
  openGroupDetail(groupId);
});
els.groupModalOverlay.addEventListener('click', function(e){
  if(e.target === els.groupModalOverlay) els.reviewCancelBtn.click();
});
document.addEventListener('keydown', function(e){
  if(e.key !== 'Escape') return;
  if(els.nameModalOverlay.classList.contains('open')){ cancelNameModal(); return; }
  if(els.groupModalOverlay.classList.contains('open')){ els.reviewCancelBtn.click(); return; }
  if(els.groupDetailOverlay.classList.contains('open')){ closeGroupDetail(); return; }
});

els.reviewSaveBtn.addEventListener('click', function(){
  var ec = state.editingConjunt;
  if(!ec) return;
  var name = els.reviewNameInput.value.trim();
  if(!name){ showToast('Posa un nom al conjunt.'); return; }
  var g = state.groups.find(function(x){ return x.id === ec.groupId; });
  var c = g && g.conjunts.find(function(x){ return x.id === ec.id; });
  if(c){
    c.name = name;
    c.rows = ec.rows;
  }
  persistGroups();
  renderGroupsPanel();
  var groupId = ec.groupId;
  closeConjuntReview();
  openGroupDetail(groupId);
});

els.deleteConjuntBtn.addEventListener('click', function(){
  var ec = state.editingConjunt;
  if(!ec) return;
  var groupId = ec.groupId, id = ec.id;
  closeConjuntReview();
  deleteConjunt(groupId, id);
  openGroupDetail(groupId);
});

function closeConjuntReview(){
  els.groupModalOverlay.classList.remove('open');
  state.editingConjunt = null;
}

// -- Export catalog JSON --
els.exportCatalogBtn.addEventListener('click', function(){
  if(!state.groups.length){ showToast('No hi ha cap grup creat.'); return; }
  var payload = {
    sourceFile: state.fileName + '.pdf',
    exportedAt: new Date().toISOString(),
    groups: state.groups.map(function(g){
      return {
        name: g.name,
        conjunts: g.conjunts.map(function(c){
          return {name:c.name, pages:c.pages, rows:c.rows};
        })
      };
    })
  };
  var blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = state.fileName + '_catalog.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
});

// ---- Export ----
els.exportBtn.addEventListener('click', function(){
  if(state.selected.size === 0) return;
  els.exportBtn.disabled = true;
  var originalLabel = els.exportBtn.textContent;
  els.exportBtn.textContent = 'Generant PDF…';
  var pagesSorted = Array.from(state.selected).sort(function(a,b){return a-b;});
  var indices = pagesSorted.map(function(p){ return p-1; });
  pdfLibReady.then(function(){
    return Promise.all([
      PDFLib.PDFDocument.load(state.pdfBytes),
      PDFLib.PDFDocument.create()
    ]);
  }).then(function(docs){
    var srcDoc = docs[0], newDoc = docs[1];
    return newDoc.copyPages(srcDoc, indices).then(function(copiedPages){
      copiedPages.forEach(function(pg){ newDoc.addPage(pg); });
      return newDoc.save();
    });
  }).then(function(bytes){
    var blob = new Blob([bytes], {type:'application/pdf'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = state.fileName + '_recanvis.pdf';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 5000);
    showToast('PDF generat: ' + state.selected.size + ' pàgines.');
  }).catch(function(err){
    console.error(err);
    showToast('Error generant el PDF: ' + err.message, 4000);
  }).then(function(){
    els.exportBtn.disabled = state.selected.size === 0;
    els.exportBtn.textContent = originalLabel;
  });
});
